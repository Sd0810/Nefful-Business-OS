        ?'<button class="btn secondary small" data-saved-load="'+S(r.id)+'">預覽／載入</button>'
        :'<button class="btn secondary small" data-saved-load="'+S(r.id)+'">查看明細</button>';
      return '<div class="service-record-card"><div class="service-record-main"><div><b>'+S(r.code||'')+'</b> '+remind+'<div class="subtle">'+S(String(r.updatedAt||r.at||'').slice(0,16).replace('T',' '))+'｜'+S(r.clientName||r.clientLookup||'未填客戶')+'</div></div><div class="service-record-summary"><span>件數 '+M(tt.qty)+'</span><span>消費 NT$'+M(tt.amount)+'</span><span>SV '+M(tt.sv)+'</span></div></div><div class="service-record-actions">'+action+' <button class="btn danger small" data-pair-delete-outside="'+S(r.id)+'">刪除</button></div></div>';
    }
    function section(title,desc,list,mode){
      return '<div class="card panel saved-table"><div class="panel-title"><div><h2>'+title+'</h2><span class="subtle">'+desc+'</span></div></div><div class="service-record-list">'+(list.length?list.map(function(r){return card(r,mode);}).join(''):'<div class="empty">目前沒有資料。</div>')+'</div></div>';
    }
    return '<div id="pairingServiceRecords"></div>'
      +section('暫存服務單｜產品搭配','客戶尚未確認時可先暫存；LINE／PDF 與建立正式紀錄移至明細內操作。',drafts,'draft')
      +section('正式服務紀錄｜產品搭配','客戶確認後建立正式紀錄；LINE／PDF 移至明細內操作。',formals,'formal');
  };
  window.savedPairingTable=savedPairingTable;

  // 產品搭配上方操作正名：只處理按鍵文字，不動原本動作。
  if(typeof clientEditor==='function' && !window.__NEFFUL_V82_CLIENT_EDITOR_SERVICE_LABELS__){
    window.__NEFFUL_V82_CLIENT_EDITOR_SERVICE_LABELS__=true;
    var oldClientEditor=clientEditor;
    clientEditor=function(){
      return String(oldClientEditor())
        .replace(/新增一筆試算/g,'新增服務單')
        .replace(/儲存試算/g,'暫存服務單')
        .replace(/LINE 精簡版/g,'複製 LINE')
        .replace(/下載 PDF/g,'下載 PDF');
    };
    window.clientEditor=clientEditor;
  }

  // 智慧換貨頁面正名與外層操作精簡：LINE/PDF 主要移至明細內。
  if(typeof exchange==='function' && !window.__NEFFUL_V82_EXCHANGE_SERVICE_FLOW_LABELS__){
    window.__NEFFUL_V82_EXCHANGE_SERVICE_FLOW_LABELS__=true;
    var oldExchange=exchange;
    exchange=function(){
      var h=String(oldExchange());
      h=h.replace(/本月換貨紀錄/g,'服務紀錄｜智慧換貨')
         .replace(/換貨暫存/g,'暫存服務單｜智慧換貨')
         .replace(/暫存換貨/g,'暫存服務單')
         .replace(/套用換貨/g,'套用服務單')
         .replace(/一鍵換貨/g,'套用服務單')
         .replace(/正式換貨/g,'正式服務紀錄');
      // 外層暫存清單移除複製 LINE，保留預覽／載入與刪除。
      h=h.replace(/<button class="btn secondary small" data-ex-draft-line="([^"]+)">複製 LINE<\/button>\s*/g,'');
      // 外層正式紀錄移除複製 LINE/PDF，保留查看明細與刪除。
      h=h.replace(/<button class="btn secondary small" data-ex-record-line="([^"]+)">複製 LINE<\/button>\s*/g,'');
      h=h.replace(/<button class="btn secondary small" data-ex-pdf="([^"]+)">PDF<\/button>\s*/g,'');
      return h;
    };
    window.exchange=exchange;
  }

  var oldModal=modal;
  modal=function(){
    var m=state.modal;
    if(m&&m.type==='pairServicePreview'){
      var r=pairRec(m.id);
      if(r) return pairPreviewModal(r,m.mode||'draft');
    }
    var h=String(oldModal());
    if(m&&m.type==='exchangeDraftPreview'){
      var d=(state.exchangeDrafts||[]).find(function(x){return x.id===m.id;});
      if(d){
        h=h.replace(/<h3>暫存換貨明細預覽/g,'<h3>暫存服務單｜智慧換貨');
        h=h.replace('<div class="modal-actions">','<div class="modal-actions"><button class="btn secondary" data-ex-draft-line="'+S(d.id)+'">複製 LINE</button>');
        h=h.replace('</div></div></div>','<button class="btn danger" data-ex-draft-del="'+S(d.id)+'">刪除</button></div></div></div>');
      }
    }
    if(m&&m.type==='exDetail'){
      var e=(state.exchanges||[]).find(function(x){return x.id===m.id;});
      if(e){
        h=h.replace(/<h3>換貨明細/g,'<h3>正式服務紀錄｜智慧換貨');
        h=h.replace('<div class="modal-actions">','<div class="modal-actions"><button class="btn secondary" data-ex-record-line="'+S(e.id)+'">複製 LINE</button>');
        h=h.replace('</div></div></div>','<button class="btn danger" data-ex-delete="'+S(e.id)+'">刪除</button></div></div></div>');
      }
    }
    return h;
  };
  window.modal=modal;

  document.addEventListener('click',function(e){
    var t=e.target&&e.target.closest?e.target.closest('[data-pair-confirm-load],[data-pair-formal-in-modal],[data-pair-line-in-modal],[data-pair-pdf-in-modal],[data-pair-delete-in-modal],[data-pair-delete-outside],[data-v82-global-service-records]'):null;
    if(!t) return;
    if(t.dataset.pairConfirmLoad){e.preventDefault();confirmLoadPairingService(t.dataset.pairConfirmLoad);return;}
    if(t.dataset.pairFormalInModal){e.preventDefault();formalizePairingService(t.dataset.pairFormalInModal);return;}
    if(t.dataset.pairLineInModal){e.preventDefault();var r=pairRec(t.dataset.pairLineInModal);if(r)copyLine(false,r);return;}
    if(t.dataset.pairPdfInModal){e.preventDefault();var r2=pairRec(t.dataset.pairPdfInModal);if(r2)downloadPairingPdf(r2);return;}
    if(t.dataset.pairDeleteInModal){e.preventDefault();deletePairService(t.dataset.pairDeleteInModal);return;}
    if(t.dataset.pairDeleteOutside){e.preventDefault();deletePairService(t.dataset.pairDeleteOutside);return;}
    if(t.dataset.v82GlobalServiceRecords){e.preventDefault();var el=document.getElementById('pairingServiceRecords')||document.querySelector('.saved-table');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});return;}
  },true);

  var css=document.createElement('style');
  css.id='v82-service-flow-list-modal-final-style';
  css.textContent='.service-record-list{display:grid;gap:10px}.service-record-card{border:1px solid #e7e1d8;border-radius:14px;padding:12px;background:#fff}.service-record-main{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.service-record-summary{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.service-record-summary span{background:#f8f5ef;border-radius:999px;padding:4px 8px;font-size:12px}.service-record-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}';
  if(!document.getElementById(css.id)) document.head.appendChild(css);
})();
</script>


<script id="v82-unified-service-event-layer">
(function(){
  if(window.__NEFFUL_V82_UNIFIED_SERVICE_EVENT_LAYER__) return;
  window.__NEFFUL_V82_UNIFIED_SERVICE_EVENT_LAYER__ = true;

  function S(v){try{return typeof esc==='function'?esc(v):String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c;});}catch(e){return String(v||'');}}
  function N(v){try{return typeof num==='function'?num(v):(Number(String(v||0).replace(/,/g,''))||0);}catch(e){return 0;}}
  function M(v){try{return typeof money==='function'?money(v):String(Math.round(N(v))).replace(/\B(?=(\d{3})+(?!\d))/g,',');}catch(e){return String(v||0);}}
  function Q(l){return N(l&&l.qty)||0;}
  function SP(l){try{return typeof colorSize==='function'?colorSize(l):[l&&l.color,l&&l.size].filter(Boolean).join(' / ')||'—';}catch(e){return [l&&l.color,l&&l.size].filter(Boolean).join(' / ')||'—';}}
  function SUB(l){try{return typeof lineSubtotal==='function'?lineSubtotal(l):N(l&&l.price)*Q(l);}catch(e){return N(l&&l.price)*Q(l);}}
  function LAB(l){try{return typeof lineLaborTotal==='function'?lineLaborTotal(l):N(l&&l.laborFee)*Q(l);}catch(e){return N(l&&l.laborFee)*Q(l);}}
  function SV(l){return N(l&&l.performance)*Q(l);}
  function T(p){try{return typeof pairingTotals==='function'?pairingTotals(p):{normalAmount:0,processedAmount:0,laborFee:0,amount:0,sv:0,qty:0,matched:[]};}catch(e){return {normalAmount:0,processedAmount:0,laborFee:0,amount:0,sv:0,qty:0,matched:[]};}}
  function statusBadge(i){var st=String((i&&i.status)||'販售中');var cls=st==='販售中'?'ok':(st==='已終止'?'gray':'warn');return '<span class="tag '+cls+'">'+S(st)+'</span>';}
  function safeClone(v){try{return JSON.parse(JSON.stringify(v||[]));}catch(e){return [];}}

  function getPairRecord(id){
    return ((state.pairing&&state.pairing.saved)||[]).find(function(r){return r.id===id;});
  }
  function getExchangeRecord(id,status){
    if(status==='draft') return ((state.exchangeDrafts)||[]).find(function(r){return r.id===id;});
    return ((state.exchanges)||[]).find(function(r){return r.id===id;});
  }
  function recordByType(type,id,status){
    return type==='pairing'?getPairRecord(id):getExchangeRecord(id,status);
  }

  function pairTitle(status){return (status==='formal'?'正式服務紀錄｜產品搭配':'暫存服務單｜產品搭配');}
  function exTitle(status){return (status==='formal'?'正式服務紀錄｜智慧換貨':'暫存服務單｜智慧換貨');}

  function pairSummary(r){
    var tt=T(r);
    var gift='';
    try{
      var cur=typeof promoCurrentText==='function'?promoCurrentText(tt):'';
      var nxt=typeof promoNextText==='function'?promoNextText(tt):'';
      if(cur||nxt){
        gift='<div class="notice" style="margin-top:10px"><b>贈品／活動提醒</b><br>'+S(cur||'目前尚未符合贈品門檻')+(nxt?'<br>'+S(nxt):'')+'</div>';
      }
    }catch(e){}
    return '<div class="notice"><b>服務單摘要</b><br>'
      +'服務單編號：'+S(r.code||'—')+'<br>'
      +'客戶：'+S(r.clientName||r.clientLookup||'—')+'｜會員編號：'+S(r.clientCode||'—')+'<br>'
      +'商品件數：'+M(tt.qty)+'｜消費金額總計：NT$'+M(tt.amount)+'｜業績 SV：'+M(tt.sv)
      +'</div>'+gift;
  }
  function pairRows(r){
    var lines=r.lines||[];
    return lines.length?lines.map(function(l){
      return '<tr><td>'+S((l.productCode||'')+' '+(l.name||''))+'<br><span class="subtle">'+S(SP(l))+'</span></td>'
        +'<td class="num">'+M(l.qty)+'</td><td class="num">NT$'+M(SUB(l))+'</td>'
        +'<td class="num">'+(l.type==='processed'?'NT$'+M(LAB(l)):'—')+'</td>'
        +'<td class="num">'+M(SV(l))+'</td><td>'+statusBadge(l)+'</td></tr>';
    }).join(''):'<tr><td colspan="6" class="empty">尚未加入產品。</td></tr>';
  }
  function exLinesTable(title,arr){
    arr=arr||[];
    return '<h4>'+S(title)+'</h4><div class="table-wrap"><table><thead><tr><th>商品／規格</th><th>數量</th><th>商品小計</th><th>工資</th><th>備註</th></tr></thead><tbody>'
      +(arr.length?arr.map(function(l){
        return '<tr><td>'+S((l.productCode||'')+' '+(l.name||''))+'<br><span class="subtle">'+S(SP(l))+'</span></td>'
          +'<td class="num">'+M(l.qty)+'</td><td class="num">NT$'+M(SUB(l))+'</td>'
          +'<td class="num">'+(N(l.laborFee)?'NT$'+M(LAB(l)):'—')+'</td><td>'+S(l.memo||l.note||'')+'</td></tr>';
      }).join(''):'<tr><td colspan="5" class="empty">沒有商品。</td></tr>')
      +'</tbody></table></div>';
  }
  function exSummary(r){
    var out=r.out||[], inn=r.in||r.inn||[];
    var outTotal=r.outTotal!==undefined?N(r.outTotal):out.reduce(function(s,l){return s+SUB(l);},0);
    var inTotal=r.inTotal!==undefined?N(r.inTotal):inn.reduce(function(s,l){return s+SUB(l);},0);
    var diff=r.diff!==undefined?N(r.diff):(inTotal-outTotal);
    var laborOut=out.reduce(function(s,l){return s+LAB(l);},0);
    var laborIn=inn.reduce(function(s,l){return s+LAB(l);},0);
    return '<div class="notice"><b>服務單摘要</b><br>'
      +'換貨編號：'+S(r.code||'—')+'<br>'
      +'換貨對象：'+S(r.exchangeTarget||r.target||'—')+'<br>'
      +'換出金額：NT$'+M(outTotal)+'｜換入金額：NT$'+M(inTotal)+'｜差額：NT$'+M(diff)+'<br>'
      +'應收工資：NT$'+M(laborOut)+'｜應付工資：NT$'+M(laborIn)
      +'</div>';
  }

  function renderServiceDetail(type,id,status){
    var r=recordByType(type,id,status);
    if(!r) return '';
    var title=type==='pairing'?pairTitle(status):exTitle(status);
    var body='';
    if(type==='pairing'){
      body=pairSummary(r)+'<div class="table-wrap"><table><thead><tr><th>商品／規格</th><th>數量</th><th>商品小計</th><th>工資</th><th>業績 SV</th><th>狀態</th></tr></thead><tbody>'+pairRows(r)+'</tbody></table></div>';
    }else{
      body=exSummary(r)+exLinesTable('換出商品',r.out||[])+exLinesTable('換入商品',r.in||r.inn||[]);
    }
    var loadBtn=(status==='draft')?'<button class="btn" data-service-action="load" data-service-type="'+type+'" data-service-id="'+S(id)+'" data-service-status="'+status+'">確認載入</button>':'';
    var formalBtn=(status==='draft')?'<button class="btn" data-service-action="formalize" data-service-type="'+type+'" data-service-id="'+S(id)+'" data-service-status="'+status+'">建立正式服務紀錄</button>':'';
    return '<div class="modal-back"><div class="modal" style="max-width:980px"><h3>'+title+'｜'+S(r.code||'')+'</h3>'+body
      +'<div class="modal-actions"><button class="btn secondary" data-act="closeModal">關閉</button>'
      +'<button class="btn secondary" data-service-action="line" data-service-type="'+type+'" data-service-id="'+S(id)+'" data-service-status="'+status+'">複製 LINE</button>'
      +'<button class="btn secondary" data-service-action="pdf" data-service-type="'+type+'" data-service-id="'+S(id)+'" data-service-status="'+status+'">下載 PDF</button>'
      +loadBtn+formalBtn
      +'<button class="btn danger" data-service-action="delete" data-service-type="'+type+'" data-service-id="'+S(id)+'" data-service-status="'+status+'">刪除</button></div></div></div>';
  }

  window.openServiceRecords=function(type){
    var target=null;
    if(type==='pairing') target=document.getElementById('pairingServiceRecords')||document.querySelector('.saved-table');
    if(type==='exchange') target=document.querySelector('[data-service-area="exchange-records"]')||Array.from(document.querySelectorAll('h2,h3')).find(function(h){return h.textContent.indexOf('智慧換貨')>=0&&h.textContent.indexOf('服務紀錄')>=0;});
    if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
  };

  window.openServiceDetail=function(type,id,status){
    state.modal={type:'serviceDetail',serviceType:type,id:id,serviceStatus:status||'formal'};
    render();
  };

  window.copyServiceLine=function(type,id,status){
    var r=recordByType(type,id,status);
    if(!r) return;
    if(type==='pairing'){
      if(typeof copyLine==='function') return copyLine(false,r);
    }else{
      var text='';
      if(typeof exchangeLineMessage==='function') text=exchangeLineMessage(r,status==='draft'?'draft':'formal');
      else text='智慧換貨服務單：'+(r.code||'');
      state.modal={type:'linePreview',title:(status==='draft'?'暫存服務單｜智慧換貨':'正式服務紀錄｜智慧換貨')+' LINE 預覽',text:text};
      render();
    }
  };

  window.downloadServicePdf=function(type,id,status){
    var r=recordByType(type,id,status);
    if(!r) return;
    if(type==='pairing'){
      if(typeof downloadPairingPdf==='function') return downloadPairingPdf(r);
    }else{
      if(typeof downloadExchangePdfFrom==='function') return downloadExchangePdfFrom(r,status==='draft'?'draft':'formal');
    }
  };

  window.loadDraftService=function(type,id){
    if(type==='pairing'){
      var r=getPairRecord(id); if(!r) return;
      Object.assign(state.pairing,{
        clientLookup:r.clientLookup||r.clientCode||'',
        clientName:r.clientName||'',
        clientCode:r.clientCode||'',
        phone:r.phone||'',
        rank:r.rank||'',
        clientBirthday:r.clientBirthday||'',
        isNewMember:r.isNewMember||'否',
        paymentMethod:r.paymentMethod||'未設定',
        useCreditGift:r.useCreditGift||'否',
        useSeasonGift:r.useSeasonGift||'否',
        note:r.note||'',
        lines:safeClone(r.lines||[]),
        currentSavedId:r.id,
        lastSavedMessage:'已載入服務單：'+(r.code||'')
      });
      state.modal=null; render(); return;
    }
    if(typeof loadExchangeDraft==='function') return loadExchangeDraft(id);
  };

  window.formalizeService=function(type,id){
    if(type==='pairing'){
      var r=getPairRecord(id); if(!r) return;
      r.serviceStatus='formal';
      r.formalAt=new Date().toISOString();
      r.updatedAt=new Date().toISOString();
      state.pairing.lastSavedMessage='已建立正式服務紀錄：'+(r.code||'');
      state.modal=null; save(); render(); return;
    }
    if(type==='exchange'){
      if(typeof loadExchangeDraft==='function'){loadExchangeDraft(id); state.modal={type:'applyExchange'}; render();}
    }
  };

  window.deleteServiceRecord=function(type,id,status){
    var r=recordByType(type,id,status); if(!r) return;
    if(!confirm('確定刪除服務單 '+(r.code||'')+'？')) return;
    if(type==='pairing'){
      state.pairing.saved=(state.pairing.saved||[]).filter(function(x){return x.id!==id;});
      state.modal=null; save(); render(); return;
    }
    if(status==='draft'){
      if(typeof deleteExchangeDraft==='function') return deleteExchangeDraft(id);
      state.exchangeDrafts=(state.exchangeDrafts||[]).filter(function(x){return x.id!==id;});
    }else{
      if(typeof deleteExchangeRecord==='function') return deleteExchangeRecord(id);
      state.exchanges=(state.exchanges||[]).filter(function(x){return x.id!==id;});
    }
    state.modal=null; save(); render();
  };

  if(typeof modal==='function' && !window.__NEFFUL_V82_MODAL_SERVICE_LAYER_WRAPPED__){
    window.__NEFFUL_V82_MODAL_SERVICE_LAYER_WRAPPED__=true;
    var oldModal=modal;
    modal=function(){
      var m=state.modal;
      if(m&&m.type==='serviceDetail') return renderServiceDetail(m.serviceType,m.id,m.serviceStatus);
      var h=String(oldModal());
      h=h.replace(/正式正式服務紀錄/g,'正式服務紀錄');
      h=h.replace(/智慧正式服務紀錄/g,'正式服務紀錄');
      return h;
    };
    window.modal=modal;
  }

  // 產品搭配紀錄列表：外層只保留進明細的共用事件按鈕。
  if(typeof savedPairingTable==='function'){
    savedPairingTable=function(){
      var rows=(state.pairing.saved||[]).map(function(r){
        if(!r.serviceStatus) r.serviceStatus='draft';
        if(!r.updatedAt) r.updatedAt=r.at||new Date().toISOString();
        return r;
      });
      var drafts=rows.filter(function(r){return r.serviceStatus!=='formal';});
      var formals=rows.filter(function(r){return r.serviceStatus==='formal';});
      function card(r,status){
        var tt=T(r);
        var label=status==='draft'?'預覽／載入':'查看明細';
        return '<div class="service-record-card"><div class="service-record-main"><div><b>'+S(r.code||'')+'</b><div class="subtle">'+S(String(r.updatedAt||r.at||'').slice(0,16).replace('T',' '))+'｜'+S(r.clientName||r.clientLookup||'未填客戶')+'</div></div><div class="service-record-summary"><span>件數 '+M(tt.qty)+'</span><span>消費 NT$'+M(tt.amount)+'</span><span>SV '+M(tt.sv)+'</span></div></div><div class="service-record-actions"><button class="btn secondary small" data-service-action="detail" data-service-type="pairing" data-service-id="'+S(r.id)+'" data-service-status="'+status+'">'+label+'</button></div></div>';
      }
      function section(title,desc,list,status){
        return '<div class="card panel saved-table"><div class="panel-title"><div><h2>'+title+'</h2><span class="subtle">'+desc+'</span></div></div><div class="service-record-list">'+(list.length?list.map(function(r){return card(r,status);}).join(''):'<div class="empty">目前沒有資料。</div>')+'</div></div>';
      }
      return '<div id="pairingServiceRecords"></div>'
        +section('暫存服務單｜產品搭配','客戶尚未確認時可先暫存；LINE／PDF／刪除移至明細內操作。',drafts,'draft')
        +section('正式服務紀錄｜產品搭配','客戶確認後建立正式紀錄；LINE／PDF／刪除移至明細內操作。',formals,'formal');
    };
    window.savedPairingTable=savedPairingTable;
  }

  // 上方操作區只留服務單主流程，移除產品搭配外層 LINE/PDF。

  function providerHtml(){return provider().split('\n').map(S).join('<br>');}
  function pdfBase(title,body){
    return '<div class="pdf-card"><div style="font-size:12px;margin-bottom:10px">'+S(typeof ymd==='function'?ymd():'')+'｜'+S(title)+'</div><div class="pdf-title">'+S(title)+'</div>'+body+'</div>';
  }
  function pairPdfHtml(p){
    var sr=buildPair(p,serviceStatus(p));
    var rows=(sr.lines||[]).map(function(l){
      return '<tr><td>'+S(lineName(l))+'</td><td>'+S(SP(l))+'</td><td class="num">'+M(Q(l))+'</td><td class="num">NT$'+M(SUB(l))+'</td><td class="num">'+M(SV(l))+'</td><td>'+S(warn(l))+'</td></tr>';
    }).join('') || '<tr><td colspan="6" class="muted">尚未選擇產品</td></tr>';
    var t=sr.totals;
    var body='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 60px;font-size:17px;line-height:1.8">'
      +'<div>日期：'+S(typeof ymd==='function'?ymd():'')+'</div><div>客戶：'+S(sr.customer)+'</div><div>會員編號：'+S(sr.member)+'</div></div>'
      +'<hr class="pdf-hr"><p>我幫你整理好這組搭配，方便確認品項、金額與目前符合的活動門檻。</p>'
      +'<div class="pdf-section-title">產品明細</div><table><thead><tr><th>商品</th><th>規格</th><th>數量</th><th>商品小計</th><th>業績 SV</th><th>備註</th></tr></thead><tbody>'+rows+'</tbody></table>'
      +'<div class="pdf-total-box"><div>一般商品金額<br><span style="font-size:18px">NT$'+M(t.normalAmount)+'</span></div><div>加工品金額<br><span style="font-size:18px">NT$'+M(t.processedAmount)+'</span></div><div>工資<br><span style="font-size:18px">NT$'+M(t.laborFee)+'</span></div></div>'
      +'<div class="pdf-total-box"><div>消費金額總計<br><span style="font-size:22px">NT$'+M(t.amount)+'</span></div><div>業績 SV 總計<br><span style="font-size:22px">SV'+M(t.sv)+'</span></div><div>商品件數<br><span style="font-size:22px">'+M(t.qty)+' 件</span></div></div>'
      +'<div class="pdf-section-title">贈品／活動提醒</div><div class="pdf-next">'+sr.promoLines.map(S).join('<br>')+'</div>'
      +'<div class="pdf-footer">'+providerHtml()+'</div><ol class="pdf-note">'+externalWarnings(sr.lines).map(function(x){return '<li>'+S(x)+'</li>';}).join('')+'</ol>';
    return pdfBase('服務單｜產品搭配',body);
  }
  function exPdfHtml(src,mode){
    var sr=buildEx(src,mode);
    function table(title,arr){
      var rows=(arr||[]).map(function(l){
        return '<tr><td>'+S(lineName(l))+'</td><td>'+S(SP(l))+'</td><td class="num">'+M(Q(l))+'</td><td class="num">NT$'+M(SUB(l))+'</td><td>'+S(l.memo||l.note||'—')+'</td></tr>';
      }).join('') || '<tr><td colspan="5" class="muted">無資料</td></tr>';
      return '<div class="pdf-section-title">'+S(title)+'</div><table><thead><tr><th>商品</th><th>規格</th><th>數量</th><th>商品小計</th><th>備註</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    var x=sr.exTotals;
    var body='<div style="font-size:17px;line-height:1.8"><div>日期：'+S(typeof ymd==='function'?ymd():'')+'</div><div>換貨對象：'+S(sr.customer)+'</div></div><hr class="pdf-hr">'
      +table('換出商品',sr.out)+table('換入商品',sr.inLines)
      +'<div class="pdf-section-title">金額與工資摘要</div><div class="pdf-next">換出金額：NT$'+M(x.outTotal)+'<br>換入金額：NT$'+M(x.inTotal)+'<br>差額：NT$'+M(x.diff)+'<br>應收工資：NT$'+M(x.laborOut)+'｜應付工資：NT$'+M(x.laborIn)+'</div>'
      +'<div class="pdf-footer">'+providerHtml()+'</div><p class="pdf-note">差額只依商品售價計算；加工品工資另列，不進入商品差額。</p>';
    return pdfBase('服務單｜智慧換貨',body);
  }

  window.pairingPrintHtml=function(p){return pairPdfHtml(p||state.pairing);};
  if(typeof exchangePrintHtml==='function'){
    window.exchangePrintHtml=function(src,mode){return exPdfHtml(src,mode||'formal');};
  }

  var pdfBusy=false;
  async function renderPdfDownload(html, filename, after){
    if(pdfBusy) return;
    pdfBusy=true;
    var holder=document.createElement('div');holder.className='pdf-render';holder.innerHTML=html;document.body.appendChild(holder);
    try{
      if(!window.html2canvas||!window.jspdf) throw new Error('PDF 套件尚未載入');
      var canvas=await html2canvas(holder,{scale:2,backgroundColor:'#ffffff'});
      var img=canvas.toDataURL('image/png');
      var jsPDF=window.jspdf.jsPDF;
      var pdf=new jsPDF('p','pt','a4');
      var pageW=pdf.internal.pageSize.getWidth(), pageH=pdf.internal.pageSize.getHeight();
      var imgW=pageW-40, imgH=canvas.height*imgW/canvas.width;
      var y=20, remaining=imgH;
      pdf.addImage(img,'PNG',20,y,imgW,imgH);
      remaining-=pageH-40;
      while(remaining>0){pdf.addPage();y-=pageH-40;pdf.addImage(img,'PNG',20,y,imgW,imgH);remaining-=pageH-40;}
      pdf.save(filename);
      if(after) after();
    }catch(e){
      alert('PDF 套件尚未載入完成，請稍後再試一次下載 PDF。');
    }finally{
      holder.remove();
      setTimeout(function(){pdfBusy=false;},800);
    }
  }
  window.downloadPairingPdf=function(p){
    p=p||state.pairing;
    var st=serviceStatus(p);
    var name='Nefful_'+(st==='formal'?'正式':'暫存')+'_產品搭配_'+((p.code||p.clientName||p.clientCode||'服務單')+'').replace(/[^\w\u4e00-\u9fa5-]/g,'')+'.pdf';
    return renderPdfDownload(pairPdfHtml(p),name,function(){if(state.pairing){state.pairing.lastSavedMessage='已下載 PDF。';render();}});
  };
  window.downloadExchangePdfFrom=function(src,mode){
    var x=src||{};
    var code=(x.code||'服務單').replace(/[^\w\u4e00-\u9fa5-]/g,'');
    var name='Nefful_'+(mode==='draft'?'暫存':'正式')+'_智慧換貨_'+code+'.pdf';
    return renderPdfDownload(exPdfHtml(src,mode),name);
  };
  window.downloadServicePdf=function(type,id,status){
    var raw=rawRecord(type,id,status); if(!raw) return;
    if(type==='pairing') return downloadPairingPdf(raw);
    return downloadExchangePdfFrom(raw,status==='draft'?'draft':'formal');
  };

  // 直接攔截所有 PDF 按鈕，避免新舊事件同時觸發造成多次下載。
  document.addEventListener('click',function(e){
    var t=e.target&&e.target.closest?e.target.closest('[data-service-action="pdf"],[data-pair-pdf],[data-ex-pdf]'):null;
    if(!t) return;
    var type=t.dataset.serviceType, id=t.dataset.serviceId, status=t.dataset.serviceStatus;
    if(t.dataset.pairPdf){type='pairing';id=t.dataset.pairPdf;var p=rawPair(id);status=(p&&p.serviceStatus==='formal')?'formal':'draft';}
    if(t.dataset.exPdf){type='exchange';id=t.dataset.exPdf;status='formal';}
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    if(type&&id) downloadServicePdf(type,id,status||'formal');
  },true);

  if(typeof modal==='function' && !window.__NEFFUL_V82_DETAIL_PDF_MODAL_WRAP__){
    window.__NEFFUL_V82_DETAIL_PDF_MODAL_WRAP__=true;
    var oldModal=modal;
    modal=function(){
      var m=state.modal;
      if(m&&(m.type==='serviceDetailConsolidated'||m.type==='serviceDetailFinal'||m.type==='serviceDetailLayered'||m.type==='serviceDetailEngine'||m.type==='serviceDetail')){
        return renderServiceDetail(m.serviceType,m.id,m.serviceStatus);
      }
      return oldModal();
    };
    window.modal=modal;
  }

  var css=document.createElement('style');
  css.id='v82-detail-pdf-final-fix-style';
  css.textContent='.service-detail-modal{max-width:1120px}.service-detail-modal table{table-layout:fixed;width:100%}.service-detail-modal th,.service-detail-modal td{word-break:break-word;overflow-wrap:anywhere}.service-detail-actions{gap:8px;flex-wrap:wrap}.step-dot{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;background:#f5e8d9;color:#8a5a2b;font-size:13px;font-weight:700;margin-right:8px}.service-section{margin:14px 0}.service-detail-modal h4{display:flex;align-items:center}';
  if(!document.getElementById(css.id)) document.head.appendChild(css);

  console.log('V8.2 detail + PDF final fix ready');
})();
</script>


<script id="v8-google-drive-cloud-sync">

(function(){
  'use strict';
  // ===== V8 Google Drive 雲端同步｜第一版 =====
  // 使用前請到 Google Cloud Console 建立：
  // 1. OAuth 2.0 Client ID（Web application），把實際使用網址加入 Authorized JavaScript origins。
  // 2. 啟用 Google Drive API。
  // 3. 若 discovery 初始化需要，可填 API_KEY；若你的專案限制不需要，也可保留空字串。
  // 注意：file:// 本機檔通常無法完成 OAuth 來源授權，建議用 localhost 或 HTTPS 網址開啟。
  const GOOGLE_CLIENT_ID = '336398923308-mgo4vbq23l6nj8hd6qhqgop9fdnqeptd.apps.googleusercontent.com';
  const GOOGLE_API_KEY = 'AIzaSyDCq-J0a9ufIdh84S5frvReliW10XRJoSg';
  const GOOGLE_DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
  const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata openid profile email';
  const CLOUD_FILE_NAME = 'nefful_backup.json';
  const CLOUD_META_STORE = 'nefful_google_drive_cloud_meta_v1';
  let tokenClient = null;
  let googleReadyPromise = null;

  function isPlaceholder(v){return !v || String(v).includes('請填入') || String(v).includes('YOUR_') || String(v).trim()==='';}
  function nowText(){return new Date().toLocaleString('zh-TW',{hour12:false});}
  function cloudMsg(msg, isError){state.cloudStatus=msg||'';state.cloudStatusError=!!isError;try{saveCloudMeta();}catch(e){};try{render();}catch(e){}}
  function loadCloudMeta(){
    try{const m=JSON.parse(localStorage.getItem(CLOUD_META_STORE)||'{}');state.googleUser=m.googleUser||state.googleUser||null;state.lastSyncTime=m.lastSyncTime||state.lastSyncTime||null;}
    catch(e){state.googleUser=state.googleUser||null;state.lastSyncTime=state.lastSyncTime||null;}
  }
  function saveCloudMeta(){
    try{localStorage.setItem(CLOUD_META_STORE,JSON.stringify({googleUser:state.googleUser||null,lastSyncTime:state.lastSyncTime||null}));}catch(e){}
  }
  function ensureCloudState(){
    state.googleUser=state.googleUser||null;
    state.googleAccessToken=state.googleAccessToken||'';
    state.lastSyncTime=state.lastSyncTime||null;
    state.cloudStatus=state.cloudStatus||'';
    state.cloudStatusError=!!state.cloudStatusError;
    loadCloudMeta();
  }
  function cloudUserHtml(){
    const u=state.googleUser;
    if(!u){
      return `<button class="btn" data-act="googleConnect">連結 Google 帳號</button>`;
    }
    const img=u.picture?`<img src="${esc(u.picture)}" alt="Google" class="cloud-avatar">`:'';
    return `<div class="cloud-user">${img}<div><b>${esc(u.name||u.email||'已連結 Google 帳號')}</b><br><span class="subtle">${esc(u.email||'Google Drive appData 同步已授權')}</span></div></div>`;
  }
  function cloudPanelHtml(){
    ensureCloudState();
    const connected=!!state.googleUser;
    const status=state.cloudStatus?`<div class="cloud-status ${state.cloudStatusError?'error':''}">${esc(state.cloudStatus)}</div>`:'';
    return `<div class="card panel cloud-sync-panel"><div class="panel-title"><div><h3 class="section-label">Google Drive 雲端同步</h3><div class="subtle">將目前單機版資料同步到 Google Drive appData 空間，供桌機與 MacBook 跨瀏覽器還原更新。</div></div></div><div class="cloud-sync-grid"><div>${cloudUserHtml()}<div class="subtle" style="margin-top:8px">上次雲端同步時間：${esc(state.lastSyncTime||'未同步')}</div>${status}</div><div class="cloud-actions">${connected?'<button class="btn" data-act="backupToCloud">立即同步至雲端</button><button class="btn secondary" data-act="restoreFromCloud">從雲端還原資料</button><button class="btn secondary" data-act="googleSignOut">登出</button>':'<span class="subtle">請先連結 Google 帳號後再同步。</span>'}</div></div><div class="notice" style="margin-top:12px">第一次使用前，請先在程式碼中填入 <b>GOOGLE_CLIENT_ID</b>，並確認 Google Cloud 專案已啟用 Drive API。</div></div>`;
  }
  function loadScript(src){
    return new Promise((resolve,reject)=>{
      if(src.includes('gsi/client') && window.google && google.accounts){resolve();return;}
      if(src.includes('api.js') && window.gapi){resolve();return;}
      const found=[...document.scripts].find(s=>s.src===src);
      if(found){found.addEventListener('load',resolve,{once:true});found.addEventListener('error',reject,{once:true});setTimeout(()=>{if((src.includes('gsi/client')&&window.google)||(src.includes('api.js')&&window.gapi))resolve();},1200);return;}
      const sc=document.createElement('script');sc.src=src;sc.async=true;sc.defer=true;sc.onload=resolve;sc.onerror=reject;document.head.appendChild(sc);
    });
  }
  async function ensureGoogleReady(){
    if(googleReadyPromise)return googleReadyPromise;
    googleReadyPromise=(async()=>{
      if(isPlaceholder(GOOGLE_CLIENT_ID))throw new Error('尚未填入 GOOGLE_CLIENT_ID，請先到 Google Cloud Console 建立 OAuth Client ID。');
      await loadScript('https://accounts.google.com/gsi/client');
      await loadScript('https://apis.google.com/js/api.js');
      await new Promise((resolve,reject)=>{gapi.load('client',{callback:resolve,onerror:()=>reject(new Error('Google API client 載入失敗'))});});
      const initOpt={discoveryDocs:[GOOGLE_DISCOVERY_DOC]};
      if(!isPlaceholder(GOOGLE_API_KEY))initOpt.apiKey=GOOGLE_API_KEY;
      await gapi.client.init(initOpt);
      tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:GOOGLE_SCOPES,callback:()=>{}});
      return true;
    })();
    return googleReadyPromise;
  }
  async function requestToken(promptMode){
    await ensureGoogleReady();
    return await new Promise((resolve,reject)=>{
      tokenClient.callback=(resp)=>{
        if(resp&&resp.error){reject(new Error(resp.error));return;}
        state.googleAccessToken=resp.access_token;
        gapi.client.setToken({access_token:resp.access_token});
        resolve(resp.access_token);
      };
      tokenClient.requestAccessToken({prompt:promptMode===false?'':'consent'});
    });
  }
  async function ensureToken(){
    if(state.googleAccessToken){try{gapi.client.setToken({access_token:state.googleAccessToken});return state.googleAccessToken;}catch(e){}}
    return requestToken(false);
  }
  async function fetchGoogleUser(){
    try{
      const res=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+state.googleAccessToken}});
      if(!res.ok)throw new Error('無法讀取 Google 使用者資訊');
      const u=await res.json();
      state.googleUser={name:u.name||'',email:u.email||'',picture:u.picture||''};
      saveCloudMeta();
    }catch(e){state.googleUser={name:'Google 帳號',email:'',picture:''};saveCloudMeta();}
  }
  async function googleConnect(){
    try{cloudMsg('正在連結 Google 帳號…');await requestToken(true);await fetchGoogleUser();cloudMsg('Google 帳號已連結。');}
    catch(e){cloudMsg('Google 連結失敗：'+(e.message||e),true);}
  }
  function exportCurrentDataForCloud(){
    try{save();}catch(e){}
    let data={};
    try{data=JSON.parse(localStorage.getItem(STORE)||'{}');}catch(e){data={};}
    data.cloudMeta={fileName:CLOUD_FILE_NAME,cloudBackedUpAt:new Date().toISOString(),app:'Nefful 妮芙露管理中心'};
    return data;
  }
  function validateCloudData(data){
    if(!data||typeof data!=='object')return false;
    const keys=['items','processedItems','members','movements','exchanges','settings','backend','pairing'];
    return keys.some(k=>Object.prototype.hasOwnProperty.call(data,k));
  }
  async function findCloudBackup(){
    await ensureToken();
    const res=await gapi.client.drive.files.list({spaces:'appDataFolder',q:`name='${CLOUD_FILE_NAME}' and trashed=false`,fields:'files(id,name,modifiedTime)',pageSize:1});
    const files=(res.result&&res.result.files)||[];
    return files[0]||null;
  }
  function multipartBody(metadata,jsonText){
    const boundary='nefful_sync_'+Date.now();
    const body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+jsonText+'\r\n--'+boundary+'--';
    return {boundary,body};
  }
  async function backupToCloud(){
    try{
      cloudMsg('正在同步至 Google Drive…');
      await ensureToken();
      const payload=exportCurrentDataForCloud();
      const jsonText=JSON.stringify(payload,null,2);
      const file=await findCloudBackup();
      if(file&&file.id){
        const res=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+encodeURIComponent(file.id)+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+state.googleAccessToken,'Content-Type':'application/json; charset=UTF-8'},body:jsonText});
        if(!res.ok)throw new Error('雲端覆蓋失敗：HTTP '+res.status);
      }else{
        const mp=multipartBody({name:CLOUD_FILE_NAME,parents:['appDataFolder'],mimeType:'application/json'},jsonText);
        const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+state.googleAccessToken,'Content-Type':'multipart/related; boundary='+mp.boundary},body:mp.body});
        if(!res.ok)throw new Error('雲端建立失敗：HTTP '+res.status);
      }
      state.lastSyncTime=nowText();saveCloudMeta();cloudMsg('已同步至雲端。');
    }catch(e){cloudMsg('同步至雲端失敗：'+(e.message||e),true);}
  }
  async function restoreFromCloud(){
    try{
      if(!confirm('確定要從 Google Drive 還原資料嗎？\n\n這會覆蓋目前瀏覽器內的本機資料。建議先下載本機備份。'))return;
      cloudMsg('正在從雲端下載資料…');
      await ensureToken();
      const file=await findCloudBackup();
      if(!file||!file.id)throw new Error('找不到雲端備份檔 nefful_backup.json');
      const res=await fetch('https://www.googleapis.com/drive/v3/files/'+encodeURIComponent(file.id)+'?alt=media',{headers:{Authorization:'Bearer '+state.googleAccessToken}});
      if(!res.ok)throw new Error('雲端下載失敗：HTTP '+res.status);
      const data=await res.json();
      if(!validateCloudData(data))throw new Error('備份格式不正確，已取消還原。');
      localStorage.setItem(STORE,JSON.stringify(data));
      load();
      ensureCloudState();
      state.lastSyncTime=nowText();saveCloudMeta();
      cloudMsg('已從雲端還原資料。');
    }catch(e){cloudMsg('從雲端還原失敗：'+(e.message||e),true);}
  }
  function googleSignOut(){
    try{if(state.googleAccessToken&&window.google&&google.accounts&&google.accounts.oauth2){google.accounts.oauth2.revoke(state.googleAccessToken,function(){});}}catch(e){}
    state.googleAccessToken='';state.googleUser=null;saveCloudMeta();cloudMsg('已登出 Google 帳號。');
  }

  ensureCloudState();
  const oldSettingsDataManagement=settingsDataManagement;
  settingsDataManagement=function(){return oldSettingsDataManagement()+cloudPanelHtml();};
  window.settingsDataManagement=settingsDataManagement;

  const oldAction=action;
  action=function(a){
    if(a==='googleConnect')return googleConnect();
    if(a==='backupToCloud')return backupToCloud();
    if(a==='restoreFromCloud')return restoreFromCloud();
    if(a==='googleSignOut')return googleSignOut();
    return oldAction(a);
  };
  window.action=action;

  const css=document.createElement('style');
  css.id='v8-google-drive-cloud-sync-style';
  css.textContent=`.cloud-sync-panel{border:1px solid var(--line);background:#fff}.cloud-sync-grid{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:center}.cloud-user{display:flex;align-items:center;gap:12px}.cloud-avatar{width:42px;height:42px;border-radius:999px;border:1px solid var(--line)}.cloud-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.cloud-status{margin-top:8px;color:var(--primary);font-weight:800}.cloud-status.error{color:var(--danger)}@media(max-width:760px){.cloud-sync-grid{grid-template-columns:1fr}.cloud-actions{justify-content:flex-start}}`;
  if(!document.getElementById(css.id))document.head.appendChild(css);

  window.backupToCloud=backupToCloud;
  window.restoreFromCloud=restoreFromCloud;
  console.log('V8 Google Drive cloud sync panel ready');
})();

</script>

<!-- V8.1 第十二版小修：移除套用確認多餘提示、PDF 改黑白簡潔線條文字風格。 -->

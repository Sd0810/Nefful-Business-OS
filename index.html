(function(){
  // 主清單操作欄統一：一般商品與加工品都只保留「編輯」，避免主畫面按鈕過多與誤刪。
  // 一般商品刪除移到編輯表單內，與加工品一致。
  const __opUnifiedInventory = inventory;
  inventory=function(){
    const s=invStats(),rows=filteredItems();
    return `<div class="grid stats">${stat('總庫存件數',s.qty,'green','📦')}${stat('販售中品項',s.active,'green','✓')}${stat('已終止品項',s.stop,'','⊘')}${stat('低庫存提醒',s.low,'orange','⚠')}</div><div class="card panel"><div class="row" style="margin-bottom:12px"><label class="drop">上傳庫存母檔<br><span class="subtle">拖曳檔案到這裡，或點擊選擇</span><input class="hidden" type="file" accept=".xlsx,.xls,.csv,.numbers" data-file="inventory"></label><label class="drop">上傳每月型錄<br><span class="subtle">拖曳檔案到這裡，或點擊選擇</span><input class="hidden" type="file" accept=".xlsx,.xls,.csv,.numbers" data-file="catalog"></label><button class="btn secondary" data-act="exportInventory">匯出清單</button><span class="subtle right">清空庫存請至「系統設定／資料管理」操作</span></div><div class="row" style="margin-bottom:12px"><input class="input search" data-filter="invQ" value="${esc(state.filters.invQ)}" placeholder="搜尋產品編號、品名、顏色、尺寸或產品備註"><select class="select" data-filter="invStatus"><option ${state.filters.invStatus==='全部'?'selected':''}>全部</option><option ${state.filters.invStatus==='販售中'?'selected':''}>販售中</option><option ${state.filters.invStatus==='已終止'?'selected':''}>已終止</option><option ${state.filters.invStatus==='非賣品'?'selected':''}>非賣品</option><option ${state.filters.invStatus==='輔銷品'?'selected':''}>輔銷品</option></select><select class="select" data-filter="invStock"><option ${state.filters.invStock==='全部'?'selected':''}>全部</option><option ${state.filters.invStock==='有庫存'?'selected':''}>有庫存</option><option ${state.filters.invStock==='無庫存'?'selected':''}>無庫存</option><option ${state.filters.invStock==='低庫存'?'selected':''}>低庫存</option></select><button class="btn" data-act="addItem">新增商品</button></div><div class="table-wrap"><table class="unified-stock-table"><thead><tr>${['商品','售價','SV','庫存','狀態','產品備註','操作'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(i=>`<tr><td>${productTwoLineCell(i)}</td><td class="num">NT$${money(i.price)}</td><td class="num">${money(i.performance)}</td><td class="num"><input class="stock-input ${num(i.stock)>0&&num(i.stock)<=3?'low':''}" type="number" min="0" value="${esc(i.stock)}" data-stock="${i.id}"></td><td>${exchangeStatusTag(i)}</td><td>${esc(i.note||'')}</td><td><button class="btn secondary small" data-edit-item="${i.id}">編輯</button></td></tr>`).join(''):`<tr><td colspan="7" class="empty">目前還沒有庫存資料，請先上傳庫存母檔。</td></tr>`}</tbody></table></div></div>`;
  };

  function patchItemDeleteButton(){
    try{
      if(!state.draft || state.draft.type!=='item')return;
      const data=state.draft.data||{};
      if(!data.id)return;
      const actions=document.querySelector('.modal .modal-actions');
      if(!actions || actions.querySelector('[data-act="deleteItemFromDraft"]'))return;
      const btn=document.createElement('button');
      btn.className='btn danger';
      btn.dataset.act='deleteItemFromDraft';
      btn.textContent='刪除';
      btn.onclick=function(){
        const target=state.items.find(i=>i.id===data.id);
        if(!target)return;
        const label=(target.baseModel||target.model||'')+' '+(target.name||'');
        if(!confirm(`確定刪除此商品？\n\n${label}\n\n此操作只會刪除商品資料，不會另外建立庫存異動紀錄。`))return;
        state.items=state.items.filter(i=>i.id!==data.id);
        state.draft=null;
        logOp(`刪除商品 ${target.baseModel||target.model||''}`);
        save();
        render();
      };
      actions.insertBefore(btn, actions.firstChild);
    }catch(e){console.warn('patchItemDeleteButton failed', e)}
  }

  const __opUnifiedRender = render;
  render=function(){
    __opUnifiedRender();
    patchItemDeleteButton();
  };
})();

function itemIsDiscontinued(i){return String(i.status||'')==='已終止'}

function itemIsGiftMarked(i){return false}

function exchangeItemRule(i){
  const r=exchangeRules();
  const outOfStock=num(i.stock)<=0;
  const discontinued=itemIsDiscontinued(i);
  const nonSale=itemIsNonSale(i);
  const support=itemIsSupport(i);
  const gift=itemIsGiftMarked(i);
  let status=[];
  if(discontinued)status.push('已終止');
  else if(nonSale)status.push('非賣品');
  else if(String(i.status||'')==='輔銷品')status.push('輔銷品');
  else status.push('販售中');
  if(outOfStock)status.push('庫存不足');
  let canSuggest=!outOfStock;
  if((r.excludeProductIds||[]).includes(i.id))canSuggest=false;
  if(r.excludeDiscontinued&&discontinued)canSuggest=false;
  if(r.excludeNonSale&&nonSale)canSuggest=false;
  if(r.excludeSupportNoPerformance&&support)canSuggest=false;
  return {canOut:!outOfStock,canIn:true,canSuggest,reason:status.join('｜')};
}

function recommendations(){
  const t=exchangeTotals();
  const r=exchangeRules();
  const tol=num(r.priceTolerance)||0;
  if(t.out<=0||t.need<=tol)return[];
  const currentInTotal=state.exchange.in.reduce((sum,l)=>sum+lineTotal(l),0);
  const target=t.out-currentInTotal;
  const usedIn=new Map(state.exchange.in.map(l=>[l.id,num(l.qty)]));
  const preferIds=new Set(r.preferProductIds||[]);
  const cands=allExchangeProducts().filter(i=>!i.isProcessed).map(i=>({...i,available:Math.max(0,num(i.stock)-num(usedIn.get(i.id)||0)),rule:exchangeItemRule(i)}))
    .filter(i=>i.rule.canSuggest&&num(i.price)>0);
  const preferred=cands.filter(i=>preferIds.has(i.id));
  const normal=cands.filter(i=>!preferIds.has(i.id));
  const combos=[];
  function scoreCombo(lines,total){
    const diff=(currentInTotal+total)-t.out;
    const preferCount=lines.reduce((s,l)=>s+(preferIds.has(l.id)?num(l.qty):0),0);
    const samePricePenalty=r.preferSamePriceRange?Math.min(...lines.map(l=>Math.abs(num(l.price)-target))):0;
    return {lines,total,diff,score:Math.abs(diff)-(preferCount*650)+(samePricePenalty*0.03)};
  }
  function addSingle(list,maxQty=4){list.forEach(a=>{for(let qa=1;qa<=maxQty;qa++){combos.push(scoreCombo([{...a,qty:qa}],qa*num(a.price)))}})}
  addSingle(preferred,5); addSingle(normal,3);
  const ordered=[...preferred,...normal];
  for(let i=0;i<ordered.length;i++)for(let j=0;j<ordered.length;j++){
    const a=ordered[i],b=ordered[j]; if(!a||!b||a.id===b.id)continue;
    for(let qa=1;qa<=3;qa++)for(let qb=1;qb<=2;qb++){
      combos.push(scoreCombo([{...a,qty:qa},{...b,qty:qb}],qa*num(a.price)+qb*num(b.price)));
    }
  }
  const seen=new Set();
  return combos.sort((a,b)=>a.score-b.score).filter(c=>{const key=c.lines.map(l=>`${l.id}x${l.qty}`).sort().join('|');if(seen.has(key))return false;seen.add(key);return true}).slice(0,8);
}

function giftNumber(v){const m=String(v||'').replace(/,/g,'').match(/(\d+)/);return m?Number(m[1]):0}
function bestByThreshold(list,sv){return list.filter(a=>sv>=a.threshold&&(a.maxSv===null||sv<=a.maxSv)).sort((a,b)=>b.threshold-a.threshold)[0]||null}
function eligibleActivitiesForSv(p=state.pairing, sv=pairingSv(p)){
  const rules=activeGiftRules().map(ruleToActivity);
  const ruleSettings=state.backend.productMatchRules||{};
  const health=bestByThreshold(rules.filter(a=>a.type==='health'),sv);
  const newbie=(ruleSettings.newMemberGiftEnabled!==false&&isPairingNewMember(p))?bestByThreshold(rules.filter(a=>a.type==='newbie'),sv):null;
  const birthday=(ruleSettings.birthdayGiftEnabled!==false&&isBirthdayQualified(p,sv))?bestByThreshold(rules.filter(a=>a.type==='birthday'),sv):null;
  const season=(ruleSettings.magazineGiftEnabled!==false&&isSeasonQualified(p))?bestByThreshold(rules.filter(a=>a.type==='season'),sv):null;
  const credit=(ruleSettings.creditCardGiftEnabled!==false&&isCreditQualified(p))?bestByThreshold(rules.filter(a=>a.type==='credit'),sv):null;
  return {health,newbie,birthday,season,credit};
}
function activityValue(a){return a&&a.available?num(a.giftValueNumber):0}
function calcMatchedForSv(p=state.pairing, sv=pairingSv(p)){
  if(!state.backend||state.backend.campaignEnabled===false)return [];
  const e=eligibleActivitiesForSv(p,sv);
  const mainBundle=[e.health,e.newbie].filter(Boolean);
  const mainValue=mainBundle.reduce((sum,a)=>sum+activityValue(a),0);
  const alternatives=[e.season,e.credit].filter(Boolean);
  let base=mainBundle;
  alternatives.forEach(alt=>{if(activityValue(alt)>mainValue&&activityValue(alt)>base.reduce((s,a)=>s+activityValue(a),0))base=[alt]});
  const matched=[...base];
  if(e.birthday)matched.push(e.birthday);
  return matched;
}
function giftValueTotal(list){return (list||[]).reduce((sum,a)=>sum+activityValue(a),0)}
function nextOfferForSv(p=state.pairing, sv=pairingSv(p)){
  if(!state.backend||state.backend.campaignEnabled===false)return null;
  const ruleSettings=state.backend.productMatchRules||{};
  const candidates=activeGiftRules({includeUnavailable:false}).map(ruleToActivity).filter(a=>{
    if(!(sv<a.threshold))return false;
    if(a.type==='newbie' && !(ruleSettings.newMemberGiftEnabled!==false&&isPairingNewMember(p)))return false;
    if(a.type==='birthday' && !(ruleSettings.birthdayGiftEnabled!==false&&isBirthdayQualified(p,a.threshold)))return false;
    if(a.type==='credit' && !(ruleSettings.creditCardGiftEnabled!==false&&isCreditQualified(p)))return false;
    if(a.type==='season' && !(ruleSettings.magazineGiftEnabled!==false&&isSeasonQualified(p)))return false;
    return ['health','newbie','birthday','credit','season'].includes(a.type);
  }).sort((a,b)=>a.threshold-b.threshold||activityValue(a)-activityValue(b));
  return candidates[0]||null;
}
function pairingTotals(p=state.pairing){
  const lines=p.lines||[];
  const normalAmount=lines.filter(l=>l.type!=='processed').reduce((sum,l)=>sum+num(l.price)*num(l.qty),0);
  const processedAmount=lines.filter(l=>l.type==='processed').reduce((sum,l)=>sum+num(l.price)*num(l.qty),0);
  const laborFee=lines.filter(l=>l.type==='processed').reduce((sum,l)=>sum+num(l.laborFee)*num(l.qty),0);
  const amount=normalAmount+processedAmount+laborFee;
  const sv=pairingSv(p);
  const qty=lines.reduce((sum,l)=>sum+num(l.qty),0);
  const matched=calcMatchedForSv(p,sv);
  const next=nextOfferForSv(p,sv);
  const currentGiftValue=giftValueTotal(matched);
  const nextMatched=next?calcMatchedForSv(p,next.threshold):matched;
  const nextGiftValue=giftValueTotal(nextMatched);
  return{amount,normalAmount,processedAmount,laborFee,sv,qty,matched,next,currentGiftValue,nextGiftValue}
}

function savePairing(){
  const saved=state.pairing.saved||[];
  const existingId=state.pairing.currentSavedId||'';
  const idx=existingId?saved.findIndex(x=>x.id===existingId):-1;
  if(idx>=0){
    const old=saved[idx];
    const rec=buildPairingRecord(old.id, old.code);
    saved[idx]=rec;
    state.pairing.currentSavedId=rec.id;
    state.pairing.dirty=false;
    state.pairing.lastSavedMessage=`✅ 已更新試算：${rec.code}，內容已更新在同一筆紀錄。`;
    logOp(`更新產品搭配試算 ${rec.code}`);
  }else{
    const code=`PS${ymd().replaceAll('-','')}-${String(saved.length+1).padStart(3,'0')}`;
    const rec=buildPairingRecord(uid(), code);
    saved.unshift(rec);
    state.pairing.currentSavedId=rec.id;
    state.pairing.dirty=false;
    state.pairing.lastSavedMessage=`✅ 已儲存試算：${code}，可於下方「已儲存試算紀錄」查看或再次載入。`;
    logOp(`儲存產品搭配試算 ${code}`);

}

async function downloadPairingPdf(p=state.pairing){
  const holder=document.createElement('div');holder.className='pdf-render';holder.innerHTML=pairingPrintHtml(p);document.body.appendChild(holder);
  const filename=`Nefful產品搭配建議_${(p.clientName||p.clientCode||ymd()).replace(/[^\w\u4e00-\u9fa5-]/g,'')}_${ymd()}.pdf`;
  try{
    if(!window.html2canvas||!window.jspdf){throw new Error('PDF 套件尚未載入')}
    const canvas=await html2canvas(holder,{scale:2,backgroundColor:'#ffffff'});
    const img=canvas.toDataURL('image/png');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','pt','a4');
    const pageW=pdf.internal.pageSize.getWidth(), pageH=pdf.internal.pageSize.getHeight();
    const imgW=pageW-40, imgH=canvas.height*imgW/canvas.width;
    let remaining=imgH, srcY=0;
    pdf.addImage(img,'PNG',20,20,imgW,imgH);
    remaining-=pageH-40;
    while(remaining>0){pdf.addPage();srcY-=pageH-40;pdf.addImage(img,'PNG',20,srcY+20,imgW,imgH);remaining-=pageH-40;}
    pdf.save(filename);
    state.pairing.lastSavedMessage='已下載 PDF。';render();
  }catch(e){
    const htmlFile=`<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><title>Nefful 產品搭配建議</title><style>body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#fff;color:#333;padding:24px}table{width:100%;border-collapse:collapse}th{background:#fff;color:#333}th,td{border-bottom:1px solid #ddd;padding:8px}.num{text-align:right}.muted{color:#666}.pdf-title{font-size:28px;font-weight:900;margin-bottom:16px}.pdf-section-title{font-size:22px;color:#333;margin:22px 0 10px;font-weight:900}.pdf-total-box{display:flex;gap:80px;justify-content:flex-start}.pdf-total-box div{font-weight:900}.pdf-footer{border-top:1px solid #ddd;padding-top:12px;color:#555;font-weight:800}.pdf-hr{border:0;border-top:3px solid #777}.pdf-next{border:1px solid #e2e2e2;border-radius:12px;padding:10px 12px;margin-top:8px}</style></head><body>${pairingPrintHtml(p)}</body></html>`;
    downloadBlob(filename.replace('.pdf','.html'),new Blob([htmlFile],{type:'text/html'}));
    alert('PDF 套件尚未載入完成，已先下載可開啟的 HTML 版。請稍後再試一次下載 PDF。');
  }finally{holder.remove()}
}

function systemDefaultSummary(){
  const d=state.backend.systemDefaults;
  if(!d)return '<div class="notice warn">目前尚未建立目前自訂預設值；「恢復為預設值」會使用系統原始預設值。</div>';
  const at=d.savedAt?d.savedAt.slice(0,16).replace('T',' '):'—';
  const giftCount=(d.giftRules||[]).length;
  return `<div class="notice"><b>目前已有自訂預設值。</b><br>建立時間：${esc(at)}｜預設活動／贈品規則：${money(giftCount)} 筆<br>恢復為預設值時，會優先套用這份目前自訂預設值。</div>`;
}
function buildSystemDefaultSnapshot(){
  const templateDrafts=readTemplateDrafts();
  const bad=validateTemplateDrafts(templateDrafts);
  if(bad.length){return {ok:false,bad}};
  return {ok:true,data:{
    savedAt:todayISO(),
    provider:{...state.backend.provider},
    templates:{...state.backend.templates,...templateDrafts},
    productMatchRules:{...state.backend.productMatchRules},
    giftRules:cloneGiftRules(state.backend.giftRules||DEFAULT_GIFT_RULES)
  }};
}
function saveCurrentAsSystemDefault(){
  const result=buildSystemDefaultSnapshot();
  if(!result.ok){
    alert(`模板含有未定義變數，無法儲存為目前自訂預設值：${result.bad.map(v=>'{{'+v+'}}').join('、')}`);
    return;
  }
  state.backend.systemDefaults=result.data;
  logOp('儲存目前自訂預設值');
  save();
  setMsg('已將目前服務者資訊、LINE／PDF 模板、活動／贈品規則與產品搭配規則儲存為目前自訂預設值。');
}
function clearSystemDefault(){
  if(!state.backend.systemDefaults){alert('目前沒有自訂預設值。');return}
  if(!confirmHighRisk('確定要恢復為系統預設值嗎？\n\n此操作會清除目前自訂預設值，之後「恢復為預設值」會改用系統原始預設值。','恢復為系統預設值'))return;
  state.backend.systemDefaults=null;
  logOp('清除目前自訂預設值');
  save();
  setMsg('已清除目前自訂預設值，恢復系統設定將改用系統內建預設值。');
}
function applySystemDefaultSnapshot(target, snapshot){
  const d=snapshot||null;
  if(!d)return target;
  target.provider={...target.provider,...(d.provider||{})};
  target.templates={...target.templates,...(d.templates||{})};
  target.productMatchRules={...target.productMatchRules,...(d.productMatchRules||{})};
  if(d.giftRules&&d.giftRules.length)target.giftRules=normalizeGiftRules(cloneGiftRules(d.giftRules));
  target.systemDefaults=d;
  target.campaignMonth=monthKey();
  target.historyQueryMonth=target.campaignMonth;
  target.campaignEnabled=true;
  target.campaignHistory={};
  ensureCampaignHistory(target);
  return target;
}

function updateProcessedDraftCalc(){
  if(!state.draft||state.draft.type!=='processed')return;
  const totalEl=$('[data-proc-total]');
  const svEl=$('[data-proc-sv]');
  const price=num(state.draft.data.price);
  const labor=num(state.draft.data.laborFee);
  if(totalEl)totalEl.value='NT$'+money(price+labor);
  if(svEl)svEl.value=money(svFromProcessedPrice(price));
}
function addGiftRule(){state.backend.giftRules.push({id:uid(),category:'其他特殊禮',activityName:'新活動',displayName:'新贈品規則',minSv:0,maxSv:'',giftItems:'',giftValue:0,appliesToNewMember:'不限',appliesToBirthday:'不限',stackGroup:'other',enabled:true,giftStatus:'正常',sortOrder:(state.backend.giftRules.length+1)*10,note:''});render()}
function resetGiftRules(){if(!confirm('確定恢復預設活動／贈品設定與金額？目前手動修改的贈品規則會被覆蓋。'))return;state.backend.giftRules=JSON.parse(JSON.stringify(DEFAULT_GIFT_RULES));save();setMsg('已恢復預設活動／贈品設定與金額。')}
function render(){save(); const active=document.activeElement; const key=active&&(active.dataset.filter?`filter:${active.dataset.filter}`:active.dataset.exSearch?`ex:${active.dataset.exSearch}`:active.dataset.pair?`pair:${active.dataset.pair}`:active.dataset.draft?`draft:${active.dataset.draft}`:active.dataset.template?`template:${active.dataset.template}`:(active.dataset.replacementSearch!==undefined?'replacementSearch':null)); const pos=active&&typeof active.selectionStart==='number'?active.selectionStart:null; const app=$('#app'); app.innerHTML=layout(); bind(); if(key){let sel=''; if(key.startsWith('filter:'))sel=`[data-filter="${key.slice(7)}"]`; if(key.startsWith('ex:'))sel=`[data-ex-search="${key.slice(3)}"]`; if(key.startsWith('pair:'))sel=`[data-pair="${key.slice(5)}"]`; if(key.startsWith('draft:'))sel=`[data-draft="${key.slice(6)}"]`; if(key.startsWith('template:'))sel=`[data-template="${key.slice(9)}"]`; if(key==='replacementSearch')sel='[data-replacement-search]'; const el=$(sel); if(el){el.focus(); if(pos!==null)try{el.setSelectionRange(pos,pos)}catch(e){}}}}
function layout(){return `<div class="wrap"><div class="top"><div class="brand"><h1>Nefful 妮芙露管理中心 V8.1 第七版｜暫存預扣與狀態修正版</h1><p>庫存、會員、加工品型錄、產品搭配、每月活動與智慧換貨</p></div>${state.tab==='home'?`<div class="top-actions"><button class="btn secondary" data-act="backup">備份全部資料</button></div>`:''}</div><div class="tabs">${['home|首頁','inventory|庫存清單','processed|加工品庫存清單','members|會員資訊','exchange|智慧換貨','pairing|產品搭配試算','settings|系統設定'].map(x=>{const [k,t]=x.split('|');return`<button class="tab ${state.tab===k?'active':''}" data-tab="${k}">${t}</button>`}).join('')}</div>${state.tab==='home'&&backupNeeded()?`<div class="notice warn"><b>本月尚未備份資料。</b> 建議每月底備份一次，以避免資料遺失。 <button class="btn small" data-act="backup">立即備份</button></div>`:''}${pageNotice()}${page()}${modal()}${draft()}`}
function stat(label,val,cls='',ico='') {return `<div class="card stat"><div class="ico">${ico}</div><div><div class="label">${label}</div><div class="val ${cls}">${val}</div></div></div>`}
function page(){if(state.tab==='home')return home(); if(state.tab==='inventory')return inventory(); if(state.tab==='processed')return processedCatalog(); if(state.tab==='members')return members(); if(state.tab==='exchange')return exchange(); if(state.tab==='pairing')return pairing(); return settingsPage()}
function home(){const s=stats(),bd=currentMonthBirthdayMembers(),moves=monthMovements().filter(m=>!state.filters.moveQ||norm(`${m.productCode} ${m.name} ${m.note}`).includes(norm(state.filters.moveQ)));return `<div class="grid stats">${stat('本月庫存增加',s.inc,'green','↗')}${stat('本月庫存減少',s.dec,'orange','↘')}${stat('本月變動品項',s.changed,'green','▤')}${stat('本月生日會員',s.bday,'green','🎂')}</div><div class="card panel birthday"><div class="panel-title"><h2>🎂 本月生日會員提醒</h2></div><div class="chips">${bd.length?bd.map(m=>`<span class="chip">${birthdayMD(m.birthday)}　${m.name}　<span class="tag peach">${rankCode(m.rank)}</span></span>`).join(''):'<span class="muted">本月沒有會員生日。</span>'}</div></div>${monthlyOffers()}<div class="card panel"><div class="panel-title"><h2>當月庫存變化紀錄</h2><div class="row"><input class="input" data-filter="moveQ" placeholder="搜尋產品、備註" value="${state.filters.moveQ}"><button class="btn secondary" data-act="historyMovements">查看歷史異動紀錄</button></div></div>${movementTable(moves)}</div>`}
function movementTable(rows){return `<div class="table-wrap"><table><thead><tr>${['日期','產品編號','品名','顏色尺寸','變化數量','變動後庫存','來源','備註','操作'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(m=>`<tr><td>${m.at.slice(0,10)}</td><td>${m.productCode}</td><td>${m.name}</td><td>${[m.color,m.size].filter(Boolean).join(' / ')||'—'}</td><td class="num ${m.change>0?'green':'orange'}">${m.change>0?'+':''}${m.change}</td><td class="num">${m.after}</td><td><span class="tag ok">${m.source}</span></td><td>${m.note||''}</td><td><button class="btn secondary small" data-hide-move="${m.id}">隱藏</button> <button class="btn secondary small" data-edit-note="${m.id}">編輯備註</button></td></tr>`).join(''):`<tr><td colspan="9" class="empty">本月尚無庫存變化紀錄。</td></tr>`}</tbody></table></div>`}
function inventory(){const s=invStats(),rows=filteredItems(); return `<div class="grid stats">${stat('總庫存件數',s.qty,'green','📦')}${stat('販售中品項',s.active,'green','✓')}${stat('已終止品項',s.stop,'','⊘')}${stat('低庫存提醒',s.low,'orange','⚠')}</div><div class="card panel"><div class="row" style="margin-bottom:12px"><label class="drop">上傳庫存母檔<br><span class="subtle">拖曳檔案到這裡，或點擊選擇</span><input class="hidden" type="file" accept=".xlsx,.xls,.csv,.numbers" data-file="inventory"></label><label class="drop">上傳每月型錄<br><span class="subtle">拖曳檔案到這裡，或點擊選擇</span><input class="hidden" type="file" accept=".xlsx,.xls,.csv,.numbers" data-file="catalog"></label><button class="btn secondary" data-act="exportInventory">匯出清單</button><span class="subtle right">清空庫存請至「系統設定／資料管理」操作</span></div><div class="row" style="margin-bottom:12px"><input class="input search" data-filter="invQ" value="${state.filters.invQ}" placeholder="搜尋產品編號、品名、顏色、尺寸或備註"><select class="select" data-filter="invStatus"><option ${state.filters.invStatus==='全部'?'selected':''}>全部</option><option ${state.filters.invStatus==='販售中'?'selected':''}>販售中</option><option ${state.filters.invStatus==='已終止'?'selected':''}>已終止</option><option ${state.filters.invStatus==='非賣品'?'selected':''}>非賣品</option><option ${state.filters.invStatus==='輔銷品'?'selected':''}>輔銷品</option></select><select class="select" data-filter="invStock"><option ${state.filters.invStock==='全部'?'selected':''}>全部</option><option ${state.filters.invStock==='有庫存'?'selected':''}>有庫存</option><option ${state.filters.invStock==='無庫存'?'selected':''}>無庫存</option><option ${state.filters.invStock==='低庫存'?'selected':''}>低庫存</option></select><button class="btn" data-act="addItem">新增商品</button></div><div class="table-wrap"><table><thead><tr>${['產品編號','品名','顏色','尺寸','售價','業績 SV','庫存','狀態','備註','操作'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(i=>`<tr><td><b>${i.baseModel||i.model}</b></td><td>${i.name}</td><td>${i.color||'—'}</td><td>${i.size||'—'}</td><td class="num">${money(i.price)}</td><td class="num">${money(i.performance)}</td><td class="num"><input class="stock-input ${num(i.stock)>0&&num(i.stock)<=3?'low':''}" type="number" min="0" value="${i.stock}" data-stock="${i.id}"></td><td>${exchangeStatusTag(i)}</td><td>${i.note||''}</td><td><button class="btn secondary small" data-edit-item="${i.id}">編輯</button></td></tr>`).join(''):`<tr><td colspan="10" class="empty">目前還沒有庫存資料，請先上傳庫存母檔。</td></tr>`}</tbody></table></div></div>`}
function members(){const bd=currentMonthBirthdayMembers(),rows=filteredMembers(); return `<div class="grid stats">${stat('會員總數',state.members.length,'green','👥')}${stat('本月生日會員',bd.length,'orange','🎂')}${stat('高聘階會員',state.members.filter(m=>['AM','AM+','AGM','NET'].includes(rankCode(m.rank))).length,'green','♕')}${stat('本月新增會員',state.members.filter(m=>dateInRange(m.updatedAt,'本月')).length,'green','＋')}</div><div class="card panel birthday"><div class="panel-title"><h2>本月生日會員提醒</h2></div><div class="chips">${bd.length?bd.map(m=>`<span class="chip">${birthdayMD(m.birthday)}　${m.name}　<span class="tag peach">${rankCode(m.rank)}</span></span>`).join(''):'<span class="muted">本月沒有會員生日。</span>'}</div></div><div class="card panel"><div class="row" style="margin-bottom:12px"><button class="btn" data-act="addMember">新增會員</button><label class="drop">匯入會員資料<br><span class="subtle">拖曳檔案到這裡，或點擊選擇</span><input class="hidden" type="file" accept=".xlsx,.xls,.csv,.numbers" data-file="members"></label><button class="btn secondary" data-act="exportMembers">匯出會員資料</button><span class="subtle right">清空會員請至「系統設定／資料管理」操作</span></div><input class="input search" style="width:100%;margin-bottom:12px" data-filter="memQ" value="${state.filters.memQ}" placeholder="搜尋姓名、會員編號、電話或 email"><div class="table-wrap"><table><thead><tr>${['會員姓名','會員編號','聘階','生日','電話','email','地址','操作'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(m=>`<tr><td><b>${m.name}</b></td><td>${m.code}</td><td><span class="tag ok">${rankCode(m.rank)}</span></td><td>${m.birthday||''}</td><td>${m.phone||''}</td><td>${m.email||''}</td><td>${m.address||''}</td><td><button class="btn secondary small" data-edit-member="${m.id}">編輯</button> <button class="btn danger small" data-del-member="${m.id}">刪除</button></td></tr>`).join(''):`<tr><td colspan="8" class="empty">目前還沒有會員資料，可以新增會員或匯入會員資料。</td></tr>`}</tbody></table></div></div>`}

function selectedLines(kind,title,desc){const arr=state.exchange[kind];const labor=kind==='out'?exchangeLaborSummary().receivable:exchangeLaborSummary().payable;const laborLabel=kind==='out'?'應收工資':'應付工資';return `<div class="card panel"><h3 class="section-label">${title}</h3><p class="subtle">${desc}</p><div class="mini-table table-wrap selected-scroll"><table><thead><tr><th>商品</th><th>售價</th><th>工資</th><th>數量</th><th>商品小計</th><th>備註</th><th>操作</th></tr></thead><tbody>${arr.length?arr.map(l=>`<tr><td>${l.productCode} ${l.name}<br><span class="subtle">${[l.color,l.size].filter(Boolean).join(' / ')||'—'}</span></td><td class="num">NT$${money(l.price)}</td><td class="num">${num(l.laborFee)?'NT$'+money(l.laborFee):'—'}</td><td><input class="stock-input" type="number" min="1" value="${l.qty}" data-line-qty="${kind}:${l.id}"></td><td class="num">NT$${money(lineSubtotal(l))}</td><td><input class="exchange-note-input" data-line-note="${kind}:${l.id}" value="${esc(l.memo||'')}" placeholder="贈品、無外袋"></td><td><button class="btn danger small" data-line-remove="${kind}:${l.id}">移除</button></td></tr>`).join(''):`<tr><td colspan="7" class="empty">尚未選擇商品。</td></tr>`}</tbody></table></div>${labor?`<div class="notice" style="margin-top:10px">${laborLabel}：NT$${money(labor)}</div>`:''}</div>`}

function chooser(kind,title,desc,forOut){const q=kind==='out'?state.exchange.searchOut:state.exchange.searchIn;const stockKey=kind==='out'?'filterOutStock':'filterInStock';const statusKey=kind==='out'?'filterOutStatus':'filterInStatus';const sourceKey=kind==='out'?'filterOutSource':'filterInSource';const stockVal=state.exchange[stockKey]||'全部';const statusVal=state.exchange[statusKey]||'全部';const sourceVal=state.exchange[sourceKey]||'全部';const rows=exchangeCandidates(q,forOut);return `<div class="card panel"><h3 class="section-label">${title}</h3><p class="subtle">${desc}</p><div class="row" style="margin-bottom:10px"><input class="input search" style="min-width:220px" data-ex-search="${kind}" value="${q}" placeholder="搜尋產品編號、品名、顏色、尺寸"><select class="select" data-ex-filter="${stockKey}"><option ${stockVal==='全部'?'selected':''}>全部</option><option ${stockVal==='有庫存'?'selected':''}>有庫存</option></select><select class="select" data-ex-filter="${statusKey}"><option ${statusVal==='全部'?'selected':''}>全部</option><option ${statusVal==='販售中'?'selected':''}>販售中</option><option ${statusVal==='非賣品'?'selected':''}>非賣品</option></select><select class="select" data-ex-filter="${sourceKey}"><option ${sourceVal==='全部'?'selected':''}>全部</option><option ${sourceVal==='一般商品'?'selected':''}>一般商品</option><option ${sourceVal==='加工品'?'selected':''}>加工品</option></select></div><div class="exchange-chooser-hint">點選商品列即可加入</div><div class="table-wrap chooser-scroll"><table class="exchange-chooser-table"><thead><tr>${['商品','售價','工資','庫存','狀態'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(i=>`<tr class="exchange-row-add" data-add-line-row="${kind}:${i.id}" title="點選商品列即可加入"><td><div class="ex-product-main"><b>${esc(i.baseModel||i.model)}</b> ${esc(i.name||'')}</div><div class="ex-product-sub">${esc(colorSize(i))}</div>${i.isProcessed?'<span class="tag peach">加工品</span>':''}${exchangeGiftNotice(i)}</td><td class="num">NT$${money(i.price)}</td><td class="num">${i.isProcessed?laborSingleText(i):'—'}</td><td class="num">${i.stock}</td><td>${exchangeStatusTag(i)}</td></tr>`).join(''):`<tr><td colspan="5" class="empty">沒有符合條件的商品。</td></tr>`}</tbody></table></div></div>`}

function exchange(){const t=exchangeTotals(),tol=num(exchangeRules().priceTolerance)||0,recs=recommendations(),monthEx=state.exchanges.filter(e=>dateInRange(e.at,'本月'));const ok=Math.abs(t.diff)<=tol;const status=ok?'可套用換貨':(t.diff<0?`客戶換入金額不足 ${money(Math.abs(t.diff))}`:`客戶換入金額超出 ${money(t.diff)}`);const statusCard=`<div class="card stat"><div class="ico">✓</div><div style="width:100%"><div class="label">換貨狀態</div><div class="val status-val ${ok?'green':'orange'}">${esc(status)}｜允許差額 ±${money(tol)}</div>${ok?'<button class="btn small" style="margin-top:8px" data-act="applyExchange">一鍵換貨</button>':'<button class="btn secondary small" style="margin-top:8px" disabled>不可套用</button>'}</div></div>`;return `<div class="grid stats exchange-compact">${stat('換出給客戶金額',money(t.out),'orange','出')}${stat('客戶換入金額',money(t.inn),'green','入')}${stat('目前差額',money(t.diff),ok?'green':'orange','差')}${statusCard}</div><div class="notice">差額只依商品售價計算，不含工資；工資會在換出／換入結果清單與確認彈窗標示應收或應付。</div><div class="exchange-select-grid">${chooser('out','左側｜選擇換出給客戶商品','可用搜尋與篩選依現場狀況選擇；換出商品需有庫存。',true)}${chooser('in','右側｜選擇客戶換入商品','可用搜尋與篩選依現場狀況選擇；換入商品可為零庫存。',false)}</div><div class="exchange-stack">${selectedLines('out','換出結果清單','這些商品會從庫存扣除；若有加工品，工資列為應收。')}${selectedLines('in','換入結果清單','這些商品會加入庫存；若有加工品，工資列為應付。')}</div><div class="card panel"><div class="panel-title"><h2>建議補足換入商品</h2><span class="subtle">系統建議依「智慧換貨規則｜V8」設定產生；加工品不主動納入建議。</span></div>${ok?`<div class="notice">目前差額已在允許範圍內，可直接套用換貨。</div>`:`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">${recs.map((r,idx)=>`<div class="recommend ${idx===0?'best':''}"><b>${idx===0?'推薦':'可考慮'}｜差額 ${money(r.diff)}</b><p>${r.lines.map(l=>`${l.baseModel||l.model} ${l.name} × ${l.qty}`).join('<br>')}</p><p>補足金額：${money(r.total)}</p><button class="btn small" data-rec="${idx}">加入換入</button></div>`).join('')}</div>`}</div><div class="card panel"><div class="panel-title"><h2>本月換貨紀錄</h2><button class="btn secondary" data-act="historyExchanges">查看歷史紀錄</button></div>${exchangeTable(monthEx)}</div>`}

function exchangeTable(rows){return `<div class="table-wrap"><table><thead><tr>${['換貨編號','日期時間','換出金額','換入金額','差額','應收工資','應付工資','備註','操作'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(e=>{const rec=(e.out||[]).reduce((s,l)=>s+num(l.laborFee)*num(l.qty),0);const pay=(e.in||[]).reduce((s,l)=>s+num(l.laborFee)*num(l.qty),0);return `<tr><td>${e.code}</td><td>${e.at.slice(0,16).replace('T',' ')}</td><td class="num">${money(e.outTotal)}</td><td class="num">${money(e.inTotal)}</td><td class="num ${Math.abs(e.diff)<=num(e.tolerance)?'green':'orange'}">${money(e.diff)}</td><td class="num">${rec?'NT$'+money(rec):'—'}</td><td class="num">${pay?'NT$'+money(pay):'—'}</td><td>${e.note||''}</td><td><button class="btn secondary small" data-ex-detail="${e.id}">查看明細</button> <button class="btn danger small" data-ex-delete="${e.id}">刪除</button></td></tr>`}).join(''):`<tr><td colspan="9" class="empty">本月尚無換貨紀錄。</td></tr>`}</tbody></table></div>`}

function deleteExchangeRecord(id){const e=state.exchanges.find(x=>x.id===id);if(!e)return;if(!confirm(`確定刪除此筆換貨紀錄 ${e.code}？\n\n此操作只會刪除紀錄，不會回復當時的庫存變動。`))return;state.exchanges=state.exchanges.filter(x=>x.id!==id);logOp(`刪除換貨紀錄 ${e.code}`);save();setMsg(`已刪除換貨紀錄：${e.code}，庫存未變動。`)}
function modal(){const m=state.modal;if(!m)return''; if(m.type==='stock'){return `<div class="modal-back"><div class="modal"><h3>確認更新庫存？</h3><p>目前庫存將從 <b>${m.oldStock}</b> 改為 <b>${m.newStock}</b>，變化數量：<b class="${m.newStock-m.oldStock>0?'green':'orange'}">${m.newStock-m.oldStock>0?'+':''}${m.newStock-m.oldStock}</b></p><textarea class="input" style="width:100%" rows="3" placeholder="備註，例如：出貨、補貨、盤點修正" data-modal-note>${m.note||''}</textarea><div class="modal-actions"><button class="btn secondary" data-act="closeModal">取消</button><button class="btn" data-act="applyStock">確認更新</button></div></div></div>`} if(m.type==='applyExchange'){const s=m.summary||exchangeTotals();return `<div class="modal-back"><div class="modal"><h3>套用換貨確認</h3><div class="notice ${s.over?'warn':''}"><b>換貨摘要</b><br>換出金額：NT$${money(s.out)}<br>換入金額：NT$${money(s.inn)}<br>差額：NT$${money(s.diff)}<br>${laborSummaryParts(exchangeLaborSummary())}${s.over?'<br><span class="warning-text">差額已超過允許範圍，請再次確認。</span>':''}</div><p class="subtle">確認套用後，換出商品會扣庫存，換入商品會加入庫存。</p><textarea class="input" style="width:100%" rows="4" placeholder="換貨備註（可留空）" data-modal-note>${esc(m.note||'')}</textarea><div class="modal-actions"><button class="btn secondary" data-act="closeModal">取消</button><button class="btn" data-act="confirmApplyExchange">確認套用</button></div></div></div>`} if(m.type==='moveHistory'){const rows=state.movements.filter(x=>dateInRange(x.at,state.filters.moveRange)&&(!state.filters.moveQ||norm(`${x.productCode} ${x.name} ${x.note}`).includes(norm(state.filters.moveQ))));return `<div class="modal-back"><div class="modal" style="max-width:1000px"><h3>歷史庫存異動紀錄</h3><div class="history-filter"><select class="select" data-filter="moveRange"><option ${state.filters.moveRange==='本月'?'selected':''}>本月</option><option ${state.filters.moveRange==='上月'?'selected':''}>上月</option><option ${state.filters.moveRange==='全部'?'selected':''}>全部</option></select><input class="input" data-filter="moveQ" value="${state.filters.moveQ} lor,l.size].filter(Boolean).join(' / ')||'—'}</td><td class="num">${l.qty}</td><td class="num">NT$${money(l.price)}</td><td class="num">${num(l.laborFee)?'NT$'+money(l.laborFee):'—'}</td><td class="num">NT$${money(lineTotal(l))}</td><td>${esc(l.memo||'')}</td><td class="num ${sign>0?'green':'orange'}">${sign>0?'+':'-'}${l.qty}</td></tr>`).join('')}</tbody></table>`;return `<div class="modal-back"><div class="modal" style="max-width:950px"><h3>換貨明細｜${e.code}</h3><p>日期時間：${e.at.slice(0,16).replace('T',' ')}｜換出 ${money(e.outTotal)}｜換入 ${money(e.inTotal)}｜差額 ${money(e.diff)}</p><div class="notice">${esc(exchangeLaborText({receivable:(e.out||[]).reduce((s,l)=>s+num(l.laborFee)*num(l.qty),0),payable:(e.in||[]).reduce((s,l)=>s+num(l.laborFee)*num(l.qty),0),net:(e.out||[]).reduce((s,l)=>s+num(l.laborFee)*num(l.qty),0)-(e.in||[]).reduce((s,l)=>s+num(l.laborFee)*num(l.qty),0)}))}</div><h4>換出給客戶（庫存減少）</h4><div class="table-wrap mini-table">${lines(e.out,-1)}</div><h4>客戶換入商品（庫存增加）</h4><div class="table-wrap mini-table">${lines(e.in,1)}</div><div class="modal-actions"><button class="btn secondary" data-act="closeModal">關閉</button></div></div></div>`} return''}
function draft(){const d=state.draft;if(!d)return''; if(d.type==='processed'){const x=d.data;const sv=svFromProcessedPrice(x.price);return `<div class="modal-back"><div class="modal"><h3>${x.id?'編輯加工品':'新增加工品'}</h3><div class="form-grid"><div class="field"><label>產品編號</label><input class="input" data-draft="code" value="${esc(x.code||nextProcessedCode())}" readonly></div><div class="field"><label>品名</label><input class="input" data-draft="name" value="${esc(x.name||'')}"></div><div class="field"><label>顏色</label><input class="input" data-draft="color" value="${esc(x.color||'')}" placeholder="可留空"></div><div class="field"><label>尺寸</label><input class="input" data-draft="size" value="${esc(x.size||'')}" placeholder="可留空"></div><div class="field"><label>售價</label><input class="input" type="number" data-draft="price" value="${esc(x.price||0)}"></div><div class="field"><label>工資</label><input class="input" type="number" data-draft="laborFee" value="${esc(x.laborFee||0)}"></div><div class="field"><label>售價＋工資（自動帶出）</label><input class="input" data-proc-total value="NT$${money(num(x.price)+num(x.laborFee))}" disabled></div><div class="field"><label>業績 SV（自動帶出）</label><input class="input" data-proc-sv value="${money(sv)}" disabled></div><div class="field"><label>庫存</label><input class="input" type="number" data-draft="stock" value="${esc(x.stock||0)}"></div><div class="field"><label>狀態</label><select class="select" data-draft="status"><option ${x.status==='販售中'?'selected':''}>販售中</option><option ${x.status==='已終止'?'selected':''}>已終止</option></select></div><div class="field" style="grid-column:1/-1"><label>備註</label><textarea class="input" data-draft="note">${esc(x.note||'')}</textarea></div></div><div class="modal-actions"><button class="btn secondary" data-act="closeDraft">取消</button><button class="btn" data-act="saveProcessedItem">儲存</button></div></div></div>`} if(d.type==='member'){const x=d.data;return `<div class="modal-back"><div class="modal"><h3>${x.id?'編輯會員':'新增會員'}</h3><div class="form-grid"><div class="field"><label>會員姓名</label><input class="input" data-draft="name" value="${x.name||''}"></div><div class="field"><label>會員編號</label><input class="input" data-draft="code" value="${x.code||''}"></div><div class="field"><label>聘階</label><select class="select" data-draft="rank">${RANKS.map(r=>`<option value="${r.code}" ${rankCode(x.rank)===r.code?'selected':''}>${r.code}｜${r.name}</option>`).join('')}</select></div><div class="field"><label>生日</label><input class="input" data-draft="birthday" value="${x.birthday||''}" placeholder="19780125 或 01/25"></div><div class="field"><label>電話</label><input class="input" data-draft="phone" value="${x.phone||''}"></div><div class="field"><label>email</label><input class="input" data-draft="email" value="${x.email||''}"></div><div class="field" style="grid-column:span 2"><label>地址</label><input class="input" data-draft="address" value="${x.address||''}"></div><div class="field" style="grid-column:1/-1"><label>備註</label><textarea class="input" data-draft="note">${x.note||''}</textarea></div></div><div class="modal-actions"><button class="btn secondary" data-act="closeDraft">取消</button><button class="btn" data-act="saveMember">儲存</button></div></div></div>`} const x=d.data;return `<div class="modal-back"><div class="modal"><h3>${x.id?'編輯商品':'新增商品'}</h3><div class="form-grid"><div class="field"><label>產品編號</label><input class="input" data-draft="baseModel" value="${x.baseModel||''}"></div><div class="field"><label>品名</label><input class="input" data-draft="name" value="${x.name||''}"></div><div class="field"><label>顏色</label><input class="input" data-draft="color" value="${x.color||''}"></div><div class="field"><label>尺寸</label><input class="input" data-draft="size" value="${x.size||''}"></div><div class="field"><label>售價</label><input class="input" type="number" data-draft="price" value="${x.price||0}"></div><div class="field"><label>業績 SV</label><input class="input" type="number" data-draft="performance" value="${x.performance||0}"></div><div class="field"><label>庫存</label><input class="input" type="number" data-draft="stock" value="${x.stock||0}"></div><div class="field"><label>狀態</label><select class="select" data-draft="status"><option ${x.status==='販售中'?'selected':''}>販售中</option><option ${x.status==='已終止'?'selected':''}>已終止</option><option ${x.status==='非賣品'?'selected':''}>非賣品</option><option ${x.status==='輔銷品'?'selected':''}>輔銷品</option></select></div><div class="field" style="grid-column:1/-1"><label>備註</label><textarea class="input" data-draft="note">${x.note||''}</textarea></div></div><div class="modal-actions"><button class="btn secondary" data-act="closeDraft">取消</button><button class="btn" data-act="saveItem">儲存</button></div></div></div>`}
function bind(){
  const debounceTimers={};
  function debounce(key,fn,delay=320){clearTimeout(debounceTimers[key]);debounceTimers[key]=setTimeout(fn,delay)}
  function bindInputNoJump(el,onValue,opts={}){let composing=false;el.addEventListener('compositionstart',()=>{composing=true});el.addEventListener('compositionend',()=>{composing=false;onValue(el.value);if(opts.renderOnEnd)render()});el.addEventListener('input',()=>{onValue(el.value);if(opts.renderDebounce&&!composing)debounce(opts.key||Math.random(),()=>render(),opts.delay||320)});el.addEventListener('change',()=>{onValue(el.value);if(opts.renderOnChange)render()});}
  $$('[data-tab]').forEach(b=>b.onclick=()=>{const next=b.dataset.tab;state.tab=next;render()});
  $$('[data-setting-tab]').forEach(b=>b.onclick=()=>{state.backend.settingsTab=b.dataset.settingTab;render()});
  $$('[data-backend]').forEach(el=>{const key=el.dataset.backend;el.onchange=()=>{state.backend[key]=el.value==='true'?true:el.value==='false'?false:el.value;markBackendAutoSaved();save();render()}});
  $$('[data-history-query]').forEach(el=>el.onchange=()=>{state.backend.historyQueryMonth=el.value;save();render()});
  $$('[data-history-new-month]').forEach(el=>bindInputNoJump(el,v=>{state.backend.historyNewMonth=half(v)},{renderOnChange:true}));
  $$('[data-provider]').forEach(el=>bindInputNoJump(el,v=>{state.backend.provider[el.dataset.provider]=half(v);markBackendAutoSaved();save();},{renderOnChange:true}));
  $$('[data-template]').forEach(el=>{const updateDraft=()=>{state.templateDrafts={...state.backend.templates,...(state.templateDrafts||{}),[el.dataset.template]:el.value};save();};el.addEventListener('compositionend',updateDraft);el.addEventListener('input',updateDraft);el.addEventListener('change',updateDraft)});
  $$('[data-pair-rule]').forEach(el=>el.onchange=()=>{state.backend.productMatchRules[el.dataset.pairRule]=el.value==='true';save();render()});
  $$('[data-ex-rule]').forEach(el=>{el.onchange=()=>{const r=exchangeRules();let v=el.type==='checkbox'?el.checked:el.value;if(v==='true')v=true;else if(v==='false')v=false;else if(el.type==='number')v=num(v);r[el.dataset.exRule]=v;save();render()}});
  $$('[data-ex-product-search]').forEach(el=>bindInputNoJump(el,v=>{exchangeRules().productSearch=v},{renderDebounce:true,key:'ex_product_search'}));
  $$('[data-ex-add-prefer]').forEach(b=>b.onclick=()=>{const r=exchangeRules();const id=b.dataset.exAddPrefer;r.preferProductIds=r.preferProductIds||[];r.excludeProductIds=(r.excludeProductIds||[]).filter(x=>x!==id);if(!r.preferProductIds.includes(id))r.preferProductIds.push(id);save();render()});
  $$('[data-ex-add-exclude]').forEach(b=>b.onclick=()=>{const r=exchangeRules();const id=b.dataset.exAddExclude;r.excludeProductIds=r.excludeProductIds||[];r.preferProductIds=(r.preferProductIds||[]).filter(x=>x!==id);if(!r.excludeProductIds.includes(id))r.excludeProductIds.push(id);save();render()});
  $$('[data-ex-remove-product]').forEach(b=>b.onclick=()=>{const r=exchangeRules();const [type,id]=b.dataset.exRemoveProduct.split(':');if(type==='prefer')r.preferProductIds=(r.preferProductIds||[]).filter(x=>x!==id);if(type==='exclude')r.excludeProductIds=(r.excludeProductIds||[]).filter(x=>x!==id);save();render()});

  $$('[data-gift]').forEach(el=>{const [idx,key]=el.dataset.gift.split(':');const update=()=>{const r=state.backend.giftRules[Number(idx)];if(!r)return;let v=el.value;if(['minSv','maxSv','giftValue','sortOrder'].includes(key))v=v===''?'':num(v);if(key==='enabled')v=el.value==='true';r[key]=v;markBackendAutoSaved();save()};el.onchange=()=>{update();render()};if(el.tagName!=='SELECT')bindInputNoJump(el,v=>{const r=state.backend.giftRules[Number(idx)];if(r){let val=v;if(['minSv','maxSv','giftValue','sortOrder'].includes(key))val=v===''?'':num(v);r[key]=val;markBackendAutoSaved();save()}},{renderOnChange:true})});
  $$('[data-del-gift]').forEach(b=>b.onclick=()=>{if(confirm('確定刪除此贈品規則？')){state.backend.giftRules.splice(Number(b.dataset.delGift),1);save();render()}});
  $$('[data-history-gift]').forEach(el=>{const [idx,key]=el.dataset.historyGift.split(':');const q=state.backend.historyQueryMonth||state.backend.campaignMonth;const update=()=>{const rec=currentHistoryRecord(q);if(!rec||!rec.giftRules)return;const r=rec.giftRules[Number(idx)];if(!r)return;let v=el.value;if(['minSv','maxSv','giftValue','sortOrder'].includes(key))v=v===''?'':num(v);r[key]=v;rec.updatedAt=todayISO();save()};el.onchange=()=>{update();render()};if(el.tagName!=='SELECT')bindInputNoJump(el,v=>{const rec=currentHistoryRecord(q);if(rec&&rec.giftRules&&rec.giftRules[Number(idx)]){let val=v;if(['minSv','maxSv','giftValue','sortOrder'].includes(key))val=v===''?'':num(v);rec.giftRules[Number(idx)][key]=val;rec.updatedAt=todayISO();save()}},{renderOnChange:true})});
  
  $$('[data-filter]').forEach(el=>{const key=el.dataset.filter; const needsRender=['invQ','memQ','moveQ','exchangeQ'].includes(key); if(el.tagName==='SELECT'){el.onchange=()=>{state.filters[key]=el.value;render()}} else bindInputNoJump(el,v=>{state.filters[key]=v},{renderDebounce:needsRender,renderOnEnd:needsRender,key:'filter_'+key})});
  $$('[data-file]').forEach(inp=>inp.onchange=e=>{const f=e.target.files[0]; if(!f)return; const t=inp.dataset.file; if(t==='inventory')uploadInventory(f); if(t==='catalog')uploadCatalog(f); if(t==='members')uploadMembers(f); if(t==='restore')restoreFile(f); inp.value=''});
  $$('[data-act]').forEach(b=>b.onclick=()=>action(b.dataset.act));
  $$('[data-stock]').forEach(i=>i.onchange=()=>updateStockConfirm(i.dataset.stock,i.value));
  $$('[data-edit-item]').forEach(b=>b.onclick=()=>openItem(state.items.find(i=>i.id===b.dataset.editItem)));
  $$('[data-del-item]').forEach(b=>b.onclick=()=>{if(confirm('確定刪除此商品？')){state.items=state.items.filter(i=>i.id!==b.dataset.delItem);save();render()}});
  $$('[data-edit-processed]').forEach(b=>b.onclick=()=>openProcessedItem(state.processedItems.find(i=>i.id===b.dataset.editProcessed)));
  $$('[data-del-processed]').forEach(b=>b.onclick=()=>{if(confirm('確定刪除此加工品？')){state.processedItems=state.processedItems.filter(i=>i.id!==b.dataset.delProcessed);save();render()}});
  $$('[data-edit-member]').forEach(b=>b.onclick=()=>openMember(state.members.find(m=>m.id===b.dataset.editMember)));
  $$('[data-del-member]').forEach(b=>b.onclick=()=>{if(confirm('確定刪除此會員？')){state.members=state.members.filter(m=>m.id!==b.dataset.delMember);save();render()}});
  $$('[data-draft]').forEach(el=>bindInputNoJump(el,v=>{
    const key=el.dataset.draft;
    state.draft.data[key]=v;
    if(state.draft&&state.draft.type==='processed'&&(key==='price'||key==='laborFee')){
      state.draft.data.performance=svFromProcessedPrice(state.draft.data.price);
      updateProcessedDraftCalc();
    }
  },{renderOnChange:el.tagName==='SELECT'}));
  $$('[data-modal-note]').forEach(el=>bindInputNoJump(el,v=>state.modal.note=v));
  $$('[data-hide-move]').forEach(b=>b.onclick=()=>{const m=state.movements.find(x=>x.id===b.dataset.hideMove);if(m)m.hidden=true;save();render()});
  $$('[data-edit-note]').forEach(b=>b.onclick=()=>{const m=state.movements.find(x=>x.id===b.dataset.editNote); if(m){const n=prompt('修改備註',m.note||''); if(n!==null){m.note=n;save();render()}}});
  $$('[data-ex-search]').forEach(el=>bindInputNoJump(el,v=>{if(el.dataset.exSearch==='out')state.exchange.searchOut=v; else state.exchange.searchIn=v},{renderDebounce:true,renderOnEnd:true,delay:80,key:'ex_'+el.dataset.exSearch}));
  $$('[data-ex-filter]').forEach(el=>el.onchange=()=>{state.exchange[el.dataset.exFilter]=el.value;save();render()});
  $$('[data-add-line]').forEach(b=>b.onclick=()=>{const [kind,id]=b.dataset.addLine.split(':'); const item=allExchangeProducts().find(i=>i.id===id); if(item)addLine(kind,item)});
  $$('[data-add-line-row]').forEach(row=>row.onclick=(ev)=>{if(ev.target.closest('button,input,select,textarea,a,label'))return;const [kind,id]=row.dataset.addLineRow.split(':');const item=allExchangeProducts().find(i=>i.id===id);if(item)addLine(kind,item)});
  $$('[data-line-qty]').forEach(el=>el.onchange=()=>{const [kind,id]=el.dataset.lineQty.split(':'); updateLineQty(kind,id,el.value)});
  $$('[data-line-note]').forEach(el=>bindInputNoJump(el,v=>{const [kind,id]=el.dataset.lineNote.split(':'); updateLineNote(kind,id,v)}));
  $$('[data-line-remove]').forEach(b=>b.onclick=()=>{const [kind,id]=b.dataset.lineRemove.split(':'); removeLine(kind,id)});
  
  $$('[data-rec]').forEach(b=>b.onclick=()=>applyRecommendation(recommendations()[Number(b.dataset.rec)]));
  $$('[data-ex-detail]').forEach(b=>b.onclick=()=>{state.modal={type:'exDetail',id:b.dataset.exDetail};render()});
  $$('[data-ex-delete]').forEach(b=>b.onclick=()=>deleteExchangeRecord(b.dataset.exDelete));
  $$('[data-pair]').forEach(el=>{const key=el.dataset.pair;const savedKeys=['clientLookup','clientName','clientCode','phone','rank','clientBirthday','isNewMember','paymentMethod','useCreditGift','useSeasonGift','note'];const touch=()=>{if(savedKeys.includes(key))markPairingDirty()};if(el.tagName==='SELECT'){el.onchange=()=>{state.pairing[key]=el.value;touch();render()}} else bindInputNoJump(el,v=>{state.pairing[key]=(key==='clientLookup'||key==='phone')?half(v):v;touch();if(key==='clientLookup')autoFillClient()},{renderDebounce:(key==='search'||key==='clientLookup'),renderOnEnd:(key==='search'||key==='clientLookup'),key:'pair_'+key})});
  $$('[data-pair-add]').forEach(b=>b.onclick=()=>{const item=allExchangeProducts().find(i=>i.id===b.dataset.pairAdd); if(item)addPairLine(item)});
  $$('[data-pair-qty]').forEach(el=>el.onchange=()=>updatePairQty(el.dataset.pairQty,el.value));
  $$('[data-pair-remove]').forEach(b=>b.onclick=()=>removePairLine(b.dataset.pairRemove));
  $$('[data-saved-load]').forEach(b=>b.onclick=()=>loadSavedPairing(b.dataset.savedLoad));
  $$('[data-saved-del]').forEach(b=>b.onclick=()=>deleteSavedPairing(b.dataset.savedDel));
  $$('[data-activity-id]').forEach(el=>{el.ondragstart=e=>{state.activityUi.dragId=el.dataset.activityId}; el.ondragover=e=>e.preventDefault(); el.ondrop=e=>{e.preventDefault(); reorderActivities(state.activityUi.dragId,el.dataset.activityId); state.activityUi.dragId=''}});

  };

  // 3) 推薦合併：排除換出同型號；同型號＋同價格合併為群組
  function itemCodeForGroup(i){return compactCode(i.baseModel||i.model||i.code||'');}
  function itemVariantLabel(i){return [i.color,i.size].filter(Boolean).join('｜')||'無規格';}
  function groupCandidatesForRecommendation(){
    const outCodes=new Set((state.exchange.out||[]).map(l=>compactCode(l.productCode||l.baseModel||l.model||'')));
    const usedIn=new Map((state.exchange.in||[]).map(l=>[l.id,num(l.qty)]));
    const groups=new Map();
    allExchangeProducts().filter(i=>!i.isProcessed).forEach(i=>{
      const code=itemCodeForGroup(i);
      if(!code||outCodes.has(code))return;
      const rule=exchangeItemRule(i);
      if(!rule.canSuggest||num(i.price)<=0)return;
      const key=norm(`${code}|${i.name||''}|${num(i.price)}`);
      if(!groups.has(key))groups.set(key,{...i,id:`GROUP:${key}`,groupKey:key,grouped:true,variants:[],qty:1});
      groups.get(key).variants.push({...i,available:Math.max(0,num(i.stock)-num(usedIn.get(i.id)||0))});
    });
    return [...groups.values()].map(g=>{
      const variants=g.variants.sort((a,b)=>String(itemVariantLabel(a)).localeCompare(String(itemVariantLabel(b)),'zh-Hant'));
      const rep=variants[0];
      return {...g,...rep,id:`GROUP:${g.groupKey}`,grouped:true,variants,price:num(rep.price),performance:num(rep.performance),baseModel:rep.baseModel||rep.model,name:rep.name};
    });
  }
  function scoreRecommendation(lines,total,t){
    const diff=(state.exchange.in||[]).reduce((s,l)=>s+lineTotal(l),0)+total-t.out;
    return {lines,total,diff,score:Math.abs(diff)};
  }
  recommendations=function(){
    const t=exchangeTotals();

    if(t.out<=0||t.need<=tol)return [];
    const currentInTotal=(state.exchange.in||[]).reduce((s,l)=>s+lineTotal(l),0);
    const target=t.out-currentInTotal;
    const groups=groupCandidatesForRecommendation();
    const combos=[];
    groups.forEach(g=>{for(let q=1;q<=4;q++){combos.push(scoreRecommendation([{...g,qty:q}],q*num(g.price),t));}});
    for(let i=0;i<groups.length;i++)for(let j=i+1;j<groups.length;j++){
      const a=groups[i],b=groups[j];
      for(let qa=1;qa<=3;qa++)for(let qb=1;qb<=2;qb++){
        combos.push(scoreRecommendation([{...a,qty:qa},{...b,qty:qb}],qa*num(a.price)+qb*num(b.price),t));
      }

    const seen=new Set();
    return combos.sort((a,b)=>a.score-b.score).filter(c=>{
      const k=c.lines.map(l=>`${l.groupKey||l.id}x${l.qty}`).sort().join('|');
      if(seen.has(k))return false;seen.add(k);return true;
    }).slice(0,8);

    return `<div class="grid stats exchange-compact">${stat('換出給客戶金額',money(t.out),'orange','出')}${stat('客戶換入金額',money(t.inn),'green','入')}${stat('目前差額',money(t.diff),ok?'green':'orange','差')}${statusCard}</div><div class="notice">差額只依商品售價計算，不含工資；工資會在換出／換入結果清單與確認彈窗標示應收或應付。</div><div class="exchange-select-grid">${chooser('out','左側｜選擇換出給客戶商品','換出商品需有可用庫存；可用庫存會扣除暫存預扣。',true)}${chooser('in','右側｜選擇客戶換入商品','換入商品可為零庫存；狀態與庫存會清楚標示，不另外彈窗。',false)}</div><div class="exchange-stack">${selectedLines('out','換出結果清單','這些商品會從庫存扣除；若有加工品，工資列為應收。')}${selectedLines('in','換入結果清單','這些商品會加入庫存；若有加工品，工資列為應付。')}</div><div class="card panel"><div class="panel-title"><h2>建議補足換入商品</h2><span class="subtle">不推薦已在換出清單中的同型號；同型號同價格會合併為一筆推薦。</span></div>${ok?`<div class="notice">目前差額已在允許範圍內，可直接套用換貨。</div>`:`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">${recs.map((r,idx)=>`<div class="recommend ${idx===0?'best':''}"><b>${idx===0?'推薦':'可考慮'}｜差額 ${money(r.diff)}</b><p>${recommendationText(r)}</p><p>補足金額：${money(r.total)}</p><button class="btn small" data-rec="${idx}">加入換入</button></div>`).join('')}</div>`}</div>${exchangeDraftPanel()}<div class="card panel"><div class="panel-title"><h2>本月換貨紀錄</h2><button class="btn secondary" data-act="historyExchanges">查看歷史紀錄</button></div>${exchangeTable(monthEx)}</div>`;

/* ===== V8.1 第八版補丁：匯出修復、生日/電話格式、智慧換貨欄位與推薦、加工品組合 UX ===== */
(function(){

  function pad2(n){return String(n).padStart(2,'0')}
  function toYMD(dt){return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`}
  function isExcelSerial(v){const n=Number(v);return Number.isFinite(n)&&n>20000&&n<60000}
  function excelSerialToYMD(v){const n=Math.floor(Number(v));const d=new Date(Date.UTC(1899,11,30+n));return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`}
  function parseBirthdayStrict(v){
    if(v===null||v===undefined||String(v).trim()==='')return {ok:true,value:''};
    if(Object.prototype.toString.call(v)==='[object Date]'&&!isNaN(v))return {ok:true,value:toYMD(v)};
    let s=half(String(v||'')).trim();
    if(!s)return {ok:true,value:''};
    if(isExcelSerial(s))return {ok:true,value:excelSerialToYMD(s)};
    const dateObj=new Date(s);
    if(/GMT|標準時間|\w{3}\s+\w{3}/.test(s)&&!isNaN(dateObj))return {ok:true,value:toYMD(dateObj)};
    s=s.replace(/[年月\.]/g,'/').replace(/日/g,'').replace(/-/g,'/').replace(/\s+/g,'');
    let m;
    if(/^\d{8}$/.test(s)){
      const y=Number(s.slice(0,4)),mo=Number(s.slice(4,6)),da=Number(s.slice(6,8));
      if(y>=1900&&mo>=1&&mo<=12&&da>=1&&da<=31)return {ok:true,value:`${y}-${pad2(mo)}-${pad2(da)}`};
    }
    if((m=s.match(/^(\d{2,4})\/(\d{1,2})\/(\d{1,2})$/))){
      let y=Number(m[1]),mo=Number(m[2]),da=Number(m[3]);
      if(y<1911)y+=1911; // 民國年
      if(y>=1900&&mo>=1&&mo<=12&&da>=1&&da<=31)return {ok:true,value:`${y}-${pad2(mo)}-${pad2(da)}`};
    }
    if((m=s.match(/^(\d{1,2})\/(\d{1,2})$/))){
      const y=new Date().getFullYear(),mo=Number(m[1]),da=Number(m[2]);
      if(mo>=1&&mo<=12&&da>=1&&da<=31)return {ok:true,value:`${y}-${pad2(mo)}-${pad2(da)}`};
    }
    return {ok:false,value:String(v||'')};
  }
  parseBirthday=function(v){return parseBirthdayStrict(v)};

(function(){

    const el=document.querySelector('[data-modal-note]');

  }

  applyStock=function(){

    const item=state.items.find(x=>x.id===m.id);

    logOp(`修改庫存 ${item.baseModel||item.model}：${before} → ${after}`);
    save();
    render();
  };

/* ===== V8.1 第十一版加工品連動修正：庫存異動、首頁呈現、換貨/搭配基本連動 ===== */
(function(){
  function processedCodeOf(item){return item&&String(item.code||item.baseModel||item.model||item.productCode||'').trim();}
  function processedFindByLine(line){
    if(!line)return null;
    const id=String(line.id||'');
    const code=String(line.productCode||line.baseModel||line.model||'');
    return (state.processedItems||[]).find(i=>String(i.id||'')===id || String(i.code||'')===code);
  }
  function sourceNameForProcessed(source){
    const s=String(source||'').trim();
    return s || '加工品庫存';
  }

  // 統一庫存異動紀錄：一般商品與加工品都可寫入首頁／歷史異動紀錄。
  addMovement=function(item,before,after,source,note){
    const b=num(before), a=num(after), ch=a-b;
    if(ch===0)return;
    state.movements=Array.isArray(state.movements)?state.movements:[];
    state.movements.unshift({
      id:uid(),
      at:todayISO(),
      productCode:processedCodeOf(item),
      name:item&&item.name||'',
      color:item&&item.color||'',
      size:item&&item.size||'',
      change:ch,
      before:b,
      after:a,
      source:sourceNameForProcessed(source),
      note:String(note||''),
      hidden:false,
      itemType:(item&&item.code&&!item.baseModel&&!item.model)?'processed':(item&&item.type==='processed'?'processed':'normal')
    });
  };

  // 加工品儲存後：記錄庫存變動、保留上方基本資料、清空下方替換搜尋暫態。
  saveProcessedItem=function(){
    if(!state.draft||state.draft.type!=='processed')return;
    ensureProcessedArrays&&ensureProcessedArrays();
    const d=updateProcessedTotalsFromReplacement(state.draft.data||{});
    const isNew=!d.id;
    const oldItem=d.id?(state.processedItems||[]).find(i=>i.id===d.id):null;
    const beforeStock=oldItem?num(oldItem.stock):0;

    d.code=processedKeyV11?processedKeyV11(d.code||nextProcessedCodeV11()):compactCode(d.code||nextProcessedCode());
    if(typeof nextProcessedCodeV11==='function' && !/^AP\d{4}$/i.test(d.code))d.code=nextProcessedCodeV11();
    d.name=String(d.name||'').trim();
    d.color=String(d.color||'').trim();
    d.size=String(d.size||'').trim();
    d.source=String(d.source||'').trim();
    d.materialNote=String(d.materialNote||'').trim();
    d.note=String(d.note||'').trim();
    d.price=num(d.price);
    d.laborFee=num(d.laborFee);
    d.performance=num(d.performance)||svFromProcessedPrice(d.price);
    d.stock=num(d.stock);
    d.totalPrice=d.price+d.laborFee;
    d.status=d.status||'販售中';
    if(!d.name){alert('請輸入加工品名稱');return;}
    const dup=(state.processedItems||[]).find(i=>i.id!==d.id&&String(i.code||'')===d.code);
    if(dup){alert('此加工品編號已存在，請確認資料。');return;}

    let savedId=d.id;
    if(d.id){
      const idx=state.processedItems.findIndex(i=>i.id===d.id);
      if(idx>=0)state.processedItems[idx]={...state.processedItems[idx],...d,updatedAt:todayISO()};
    }else{
      savedId=uid();
      state.processedItems.unshift({...d,id:savedId,updatedAt:todayISO()});
      d.id=savedId;
    }
    const saved=(state.processedItems||[]).find(i=>i.id===savedId)||d;
    const afterStock=num(saved.stock);
    if(isNew){
      if(afterStock!==0)addMovement(saved,0,afterStock,'加工品新增',`新增加工品 ${saved.code||''}`.trim());
    }else if(beforeStock!==afterStock){
      addMovement(saved,beforeStock,afterStock,'加工品庫存調整',`編輯加工品 ${saved.code||''}`.trim());
    }

    // 保留上方加工品基本資料；清空替換商品搜尋欄等暫態，避免下一次殘留。
    state.draft.data={...saved,replacementSearch:''};
    logOp(`儲存加工品 ${saved.code}`);
    save();
    setMsg(`已儲存加工品：${saved.code} ${saved.name}。替換商品搜尋暫態已清空。`);
    render();
  };

  // 正式智慧換貨後，加工品換出／換入也要寫入庫存異動紀錄；不改推薦與查找核心邏輯。
  const __executeExchangeProcessedMovement=executeExchange;
  executeExchange=function(note=''){
    const beforeProcessed=new Map((state.processedItems||[]).map(i=>[String(i.id),num(i.stock)]));
    const outLines=(state.exchange&&state.exchange.out?state.exchange.out:[]).filter(l=>l.type==='processed').map(l=>({...l}));
    const inLines=(state.exchange&&state.exchange.in?state.exchange.in:[]).filter(l=>l.type==='processed').map(l=>({...l}));
    const beforeCount=(state.exchanges||[]).length;
    __executeExchangeProcessedMovement(note);
    if((state.exchanges||[]).length<=beforeCount)return;
    const code=(state.exchanges&&state.exchanges[0]&&state.exchanges[0].code)||'智慧換貨';
    outLines.forEach(l=>{
      const item=processedFindByLine(l);
      if(!item)return;
      const before=beforeProcessed.has(String(item.id))?beforeProcessed.get(String(item.id)):num(item.stock)+num(l.qty);
      const after=num(item.stock);
      addMovement(item,before,after,'智慧換貨',`${code} 換出加工品`);
    });
    inLines.forEach(l=>{
      const item=processedFindByLine(l);
      if(!item)return;
      const before=beforeProcessed.has(String(item.id))?beforeProcessed.get(String(item.id)):num(item.stock)-num(l.qty);
      const after=num(item.stock);
      addMovement(item,before,after,'智慧換貨',`${code} 換入加工品`);
    });
    save();
  };

  // 產品搭配基本連動保護：加工品可選、工資另列、消費金額與 SV 保持既有基本計算。
  const __pairingTotalsProcessedLink=pairingTotals;
  pairingTotals=function(p=state.pairing){
    const t=__pairingTotalsProcessedLink(p);
    const lines=(p&&p.lines)||[];
    const normalAmount=lines.filter(l=>l.type!=='processed').reduce((sum,l)=>sum+num(l.price)*num(l.qty),0);
    const processedAmount=lines.filter(l=>l.type==='processed').reduce((sum,l)=>sum+num(l.price)*num(l.qty),0);
    const laborFee=lines.filter(l=>l.type==='processed').reduce((sum,l)=>sum+num(l.laborFee)*num(l.qty),0);
    return {...t,normalAmount,processedAmount,laborFee,amount:normalAmount+processedAmount+laborFee,sv:lines.reduce((sum,l)=>sum+num(l.performance)*num(l.qty),0)};
  };

  try{document.title='Nefful 妮芙露管理中心 v8.1 第十一版加工品連動修正版';}catch(_e){}
})();

/* ===== V8.1 第十一版：庫存異動命名與流程統一修正版 ===== */
(function(){
  function movementProductCode(item){return String((item&&(item.baseModel||item.model||item.code||item.productCode))||'')}
  function isProcessedItem(item){return !!(item&&(item.itemType==='processed'||item.type==='processed'||String(item.code||'').match(/^AP\d{4}$/i)||String(item.productCode||'').match(/^AP\d{4}$/i)))}
  function normalizeMovementSource(source,note,item){
    const s=String(source||''), n=String(note||'');
    if(s.includes('智慧換貨')||s==='換貨'||n.includes('換出')||n.includes('換入')){
      if(n.includes('換出'))return '智慧換貨｜換出';
      if(n.includes('換入'))return '智慧換貨｜換入';
      return '智慧換貨';
    }
    if(s.includes('匯入'))return '匯入更新';
    if(s.includes('新增加工品'))return '新增加工品';
    if(s.includes('新增商品'))return '新增商品';
    if(s.includes('新增')&&isProcessedItem(item))return '新增加工品';
    if(s.includes('新增'))return '新增商品';
    if(s.includes('手動')||s.includes('編輯')||s.includes('加工品手動')||s.includes('加工品編輯'))return '手動調整';
    return s||'手動調整';
  }
  function normalizeMovementNote(source,note,item){

        if(!html.includes('data-act="deleteItemFromDraft"')){
          html = html.replace('<div class="modal-actions">', '<div class="modal-actions"><button class="btn danger" data-act="deleteItemFromDraft">刪除</button>');

      if(!d || !d.id){alert('找不到要刪除的商品資料。');return;}
      const target = (state.items || []).find(i => i.id === d.id);
      const label = target ? `${target.baseModel || target.model || ''} ${target.name || ''}`.trim() : `${d.baseModel || d.model || ''} ${d.name || ''}`.trim();

/* ===== V8.1 第十一版小修：編輯表單庫存儲存流程真正修正 ===== */
(function(){
  function cleanNum(v){return Math.max(0,num(v));}
  function itemDraftData(){return state.draft&&state.draft.type==='item'&&state.draft.data?{...state.draft.data}:null;}
  function processedDraftData(){return state.draft&&state.draft.type==='processed'&&state.draft.data?{...state.draft.data}:null;}
  function normItemDraft(d){
    d={...d};
    d.model=d.model||d.baseModel;
    d.baseModel=d.baseModel||d.model;
    d.lookupKey=d.lookupKey||[d.baseModel,d.color,d.size].filter(Boolean).join('');
    d.price=num(d.price);d.performance=num(d.performance);d.stock=cleanNum(d.stock);
    d.name=String(d.name||'').trim();d.color=String(d.color||'').trim();d.size=String(d.size||'').trim();d.note=String(d.note||'').trim();
    d.status=d.status||'販售中';
    return d;
  }
  function normProcDraft(d){
    d={...d};
    if(typeof updateProcessedTotalsFromReplacement==='function'){
      try{d=updateProcessedTotalsFromReplacement(d);}catch(_e){}
    }
    d.code=compactCode(d.code||'');
    if(!d.code&&typeof nextProcessedCode==='function')d.code=nextProcessedCode();
    d.code=String(d.code||'').replace(/^加工品[-_]?/,'AP').replace(/^ap/i,'AP');
    d.name=String(d.name||'').trim();d.color=String(d.color||'').trim();d.size=String(d.size||'').trim();
    d.source=String(d.source||'').trim();d.materialNote=String(d.materialNote||'').trim();d.note=String(d.note||'').trim();
    d.price=num(d.price);d.laborFee=num(d.laborFee);d.performance=num(d.performance)||svFromProcessedPrice(d.price);d.stock=cleanNum(d.stock);d.totalPrice=d.price+d.laborFee;d.status=d.status||'販售中';
    return d;
  }
  function addMoveUnified(item,before,after,source,note,itemType){
    if(before===after)return;
    try{addMovement({...item,itemType:itemType||item.itemType},before,after,source,note);}catch(e){
      state.movements=Array.isArray(state.movements)?state.movements:[];
      state.movements.unshift({id:uid(),at:todayISO(),productCode:item.baseModel||item.model||item.code||'',name:item.name||'',color:item.color||'',size:item.size||'',change:after-before,before,after,source:source||'手動調整',note:note||'手動調整庫存',hidden:false,itemType:itemType||''});
    }
  }
  function commitItemFromEdit(d,note){
    d=normItemDraft(d);
    if(!d.baseModel&&!d.model){alert('請輸入產品編號');return false;}
    if(d.id){
      const idx=(state.items||[]).findIndex(i=>i.id===d.id);
      const old=idx>=0?state.items[idx]:null;
      const before=old?num(old.stock):0;
      if(idx>=0)state.items[idx]={...old,...d,updatedAt:todayISO()};
      const saved=idx>=0?state.items[idx]:d;
      if(old&&before!==num(d.stock))addMoveUnified(saved,before,num(d.stock),'手動調整',note||'編輯商品時調整庫存','normal');
    }else{
      const saved={...d,id:uid(),updatedAt:todayISO()};
      state.items=Array.isArray(state.items)?state.items:[];
      state.items.unshift(saved);
      if(num(saved.stock)>0)addMoveUnified(saved,0,num(saved.stock),'新增商品',note||'新增商品庫存','normal');
    }
    return true;
  }
  function commitProcessedFromEdit(d,note){
    d=normProcDraft(d);
    if(!d.name){alert('請輸入加工品名稱');return null;}
    state.processedItems=Array.isArray(state.processedItems)?state.processedItems:[];
    const dup=state.processedItems.find(i=>i.id!==d.id&&String(i.code||'')===String(d.code||''));
    if(dup){alert('此加工品編號已存在，請確認資料。');return null;}
    let saved;
    if(d.id){
      const idx=state.processedItems.findIndex(i=>i.id===d.id);
      const old=idx>=0?state.processedItems[idx]:null;
      const before=old?num(old.stock):0;
      if(idx>=0){state.processedItems[idx]={...old,...d,updatedAt:todayISO()};saved=state.processedItems[idx];}
      else{saved={...d,updatedAt:todayISO()};state.processedItems.unshift(saved);}
      if(old&&before!==num(d.stock))addMoveUnified(saved,before,num(d.stock),'手動調整',note||'編輯加工品時調整庫存','processed');
    }else{
      saved={...d,id:uid(),updatedAt:todayISO()};
      state.processedItems.unshift(saved);
      if(num(saved.stock)>0)addMoveUnified(saved,0,num(saved.stock),'新增加工品',note||'新增加工品庫存','processed');

  function openEditStockNoteModal(kind,d,oldStock,newStock){

  };
  function confirmSaveItemStockDirect(){

  }
  function confirmSaveProcessedStockDirect(){
    const m=state.modal;if(!m||m.type!=='saveProcessedStockDirect')return;

    }
    return __modalEditStockDirect();
  };
  const __actionEditStockDirect=action;

    if(a==='confirmSaveItemStockDirect')return confirmSaveItemStockDirect();
    if(a==='confirmSaveProcessedStockDirect')return confirmSaveProcessedStockDirect();

  };
  try{document.title='Nefful 妮芙露管理中心 v8.1 第十二版智慧換貨明細與LINE白頁修正版';}catch(_e){}

<script id="v82-service-product-pool-core">
(function(){
  'use strict';
  /* V8.2 服務單共用產品池：一般庫存 + 加工品庫存。產品搭配與智慧換貨共用來源，各流程再套自己的規則。 */
  function N(v){
    if(typeof num==='function')return num(v);
    var n=Number(String(v||0).replace(/,/g,''));
    return isNaN(n)?0:n;
  }
  function C(v){
    if(typeof compactCode==='function')return compactCode(v||'');
    return String(v||'').trim();
  }
  function replacementList(item){
    if(typeof replacementItems==='function')return replacementItems(item);
    return Array.isArray(item&&item.replacementItems)?item.replacementItems:[];
  }
  function normalizeNormalProduct(i){
    i=i||{};
    var code=C(i.baseModel||i.model||i.code||i.productCode||'');
    var price=N(i.price);
    return Object.assign({},i,{
      id:i.id,
      serviceProductId:'normal:'+String(i.id||code),
      serviceType:'product',
      type:'normal',
      isProcessed:false,
      source:'一般商品',
      sourceType:'一般商品',
      code:code,
      productCode:code,
      model:i.model||code,
      baseModel:i.baseModel||code,
      lookupKey:i.lookupKey||[code,i.color,i.size].filter(Boolean).join(''),
      name:i.name||'',
      color:i.color||'',
      size:i.size||'',
      price:price,
      laborFee:0,
      totalPrice:price,
      performance:N(i.performance),
      stock:N(i.stock),
      status:i.status||'販售中',
      note:i.note||'',
      updatedAt:i.updatedAt||''
    });
  }
  function normalizeProcessedProduct(i){
    i=i||{};
    var code=C(i.code||i.baseModel||i.model||i.productCode||'');
    var price=N(i.price), labor=N(i.laborFee);
    return Object.assign({},i,{
      id:i.id,
      serviceProductId:'processed:'+String(i.id||code),
      serviceType:'processed',
      type:'processed',
      isProcessed:true,
      source:i.source||'加工品',
      sourceType:'加工品',
      code:code,
      productCode:code,
      model:code,
      baseModel:code,
      lookupKey:i.lookupKey||code,
      name:i.name||'',
      color:i.color||'',
      size:i.size||'',
      price:price,
      laborFee:labor,
      totalPrice:price+labor,
      performance:N(i.performance),
      stock:N(i.stock),
      status:i.status||'販售中',
      note:i.note||'',
      materialNote:i.materialNote||'',
      replacementItems:replacementList(i),
      updatedAt:i.updatedAt||''
    });
  }
  function getServiceProducts(options){
    options=options||{};
    var normal=(state.items||[]).map(normalizeNormalProduct);
    var processed=(state.processedItems||[]).map(normalizeProcessedProduct);
    var list=normal.concat(processed);
    if(options.type==='normal')list=list.filter(function(i){return !i.isProcessed;});
    if(options.type==='processed')list=list.filter(function(i){return !!i.isProcessed;});
    if(options.status&&options.status!=='全部')list=list.filter(function(i){return String(i.status||'')===String(options.status);});
    return list;
  }
  function getServiceProductById(id,type){
    return getServiceProducts().find(function(i){
      if(type&&String(i.type)!==String(type))return false;
      return String(i.id)===String(id)||String(i.serviceProductId)===String(id);
    })||null;
  }
  function serviceProductSourcePass(item,val){
    if(!val||val==='全部')return true;
    if(val==='一般商品'||val==='庫存商品')return !item.isProcessed;
    if(val==='加工品')return !!item.isProcessed;
    return String(item.source||'')===String(val)||String(item.sourceType||'')===String(val);
  }
  window.getServiceProducts=getServiceProducts;
  window.getServiceProductById=getServiceProductById;
  window.serviceProductSourcePass=serviceProductSourcePass;
  window.allExchangeProducts=function(){return getServiceProducts();};
  try{allExchangeProducts=window.allExchangeProducts;}catch(e){}
  try{productSourcePass=serviceProductSourcePass;}catch(e){}
  try{document.title='Nefful 妮芙露管理中心 V8.2 服務單流程化版｜共用產品池';}catch(e){}
})();
</script>


<script id="v82-service-record-naming-layout-fix">
(function(){
  if(window.__NEFFUL_V82_SERVICE_RECORD_NAMING_LAYOUT_FIX__) return;
  window.__NEFFUL_V82_SERVICE_RECORD_NAMING_LAYOUT_FIX__ = true;

  function N(v){try{return typeof num==='function'?num(v):(Number(String(v||0).replace(/,/g,''))||0);}catch(e){return 0;}}
  function M(v){try{return typeof money==='function'?money(v):String(Math.round(N(v))).replace(/\B(?=(\d{3})+(?!\d))/g,',');}catch(e){return String(v||0);}}
  function S(v){try{return typeof esc==='function'?esc(v):String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c;});}catch(e){return String(v||'');}}
  function C(v){try{return typeof compactCode==='function'?compactCode(v):String(v||'').trim();}catch(e){return String(v||'').trim();}}
  function Q(l){return N(l&&l.qty)||0;}
  function SP(l){try{return typeof colorSize==='function'?colorSize(l):[l&&l.color,l&&l.size].filter(Boolean).join(' / ');}catch(e){return [l&&l.color,l&&l.size].filter(Boolean).join(' / ');}}
  function SUB(l){try{return typeof lineSubtotal==='function'?lineSubtotal(l):N(l&&l.price)*Q(l);}catch(e){return N(l&&l.price)*Q(l);}}
  function LAB(l){try{return typeof lineLaborTotal==='function'?lineLaborTotal(l):N(l&&l.laborFee)*Q(l);}catch(e){return N(l&&l.laborFee)*Q(l);}}
  function SV(l){return N(l&&l.performance)*Q(l);}
  function T(p){try{return typeof pairingTotals==='function'?pairingTotals(p):{normalAmount:0,processedAmount:0,laborFee:0,amount:0,sv:0,qty:0,matched:[]};}catch(e){return {normalAmount:0,processedAmount:0,laborFee:0,amount:0,sv:0,qty:0,matched:[]};}}
  function statusBadge(i){var st=String((i&&i.status)||'販售中');var cls=st==='販售中'?'ok':(st==='已終止'?'gray':'warn');return '<span class="tag '+cls+'">'+S(st)+'</span>';}
  function statusPass(i,st){if(!st||st==='全部')return true;return String((i&&i.status)||'販售中')===st;}
  function sourcePass(i,src){if(!src||src==='全部')return true;var p=(i&&(i.isProcessed||i.type==='processed'));return src==='加工品'?p:!p;}
  function older(d,days){var dt=new Date(d||Date.now());return !isNaN(dt.getTime()) && (Date.now()-dt.getTime())>days*86400000;}
  function normalizeSaved(){
    if(!state.pairing) return [];
    var a=state.pairing.saved||[];
    a.forEach(function(r){
      if(!r.serviceType) r.serviceType='pairing';
      if(!r.serviceStatus) r.serviceStatus='draft';
      if(!r.updatedAt) r.updatedAt=r.at||new Date().toISOString();
      if(!r.followUpAfterDays) r.followUpAfterDays=3;
    });
    state.pairing.saved=a;
    return a;
  }
  function serviceProducts(){
    if(typeof getServiceProducts==='function') return getServiceProducts();
    if(typeof allExchangeProducts==='function') return allExchangeProducts();
    return [];
  }
  function pairingCands(){
    var q=typeof norm==='function'?norm(state.pairing.search):String(state.pairing.search||'').toLowerCase();
    var st=state.pairing.statusFilter||'全部';
    var src=state.pairing.sourceFilter||'全部';
    return serviceProducts().filter(function(i){
      var text=typeof norm==='function'
        ? norm([i.baseModel,i.model,i.code,i.name,i.color,i.size,i.note,i.isProcessed?'加工品':''].join(' '))
        : [i.baseModel,i.model,i.code,i.name,i.color,i.size,i.note].join(' ').toLowerCase();
      if(q && text.indexOf(q)<0) return false;
      if(!statusPass(i,st)) return false;
      if(!sourcePass(i,src)) return false;
      return N(i.performance)>0;
    }).slice(0,100);
  }
  pairingCandidates = pairingCands;
  window.pairingCandidates = pairingCands;

  function recCard(r,mode){
    var qty=r.qty||(r.lines||[]).reduce(function(s,l){return s+Q(l);},0);

  };

        + '<td><b>'+S(i.baseModel||i.model||i.code||'')+'</b><br><span class="subtle">'+S(i.name||'')+'</span><br><span class="subtle">'+S(SP(i))+'</span></td>'
        + '<td class="num">NT$'+M(i.price)+'</td>'

        + '<td class="num">NT$'+M(SUB(l))+'</td>'
        + '<td class="num">'+(l.type==='processed'?'NT$'+M(LAB(l)):'—')+'</td>'

  function statusPass(i,st){
